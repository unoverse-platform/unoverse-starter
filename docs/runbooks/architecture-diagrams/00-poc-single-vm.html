<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figure 0: POC / Development — Single VM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      @media print {
        body {
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
      }
    </style>
  </head>
  <body class="bg-white">
    <div id="root"></div>
    <script type="text/babel">
      const App = () => (
        <div className="max-w-4xl mx-auto p-8">
          <h2 className="text-2xl font-bold mb-6 text-gray-800 border-b-2 border-gray-300 pb-3">
            A. POC / Development &mdash; Single VM
          </h2>
          <p className="text-sm text-gray-600 mb-6">
            All platform services deployed to a single VM via <strong>Ansible</strong>. Bundled observability stack
            available for demo purposes. <strong>Not for production.</strong>
          </p>

          {/* Single VM box */}
          <div className="border-4 border-yellow-500 rounded-lg p-6 bg-yellow-50">
            <div className="bg-yellow-500 text-white p-3 rounded-lg mb-5 text-center">
              <h3 className="font-bold text-xl">SINGLE VM (POC)</h3>
              <p className="text-sm mt-1">
                1 VM &middot; 4 vCPU &middot; 8 GB RAM &middot; 100 GB SSD &middot; Deployed via Ansible
              </p>
            </div>

            {/* Platform Services */}
            <div className="mb-5">
              <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Platform Services</p>
              <div className="grid grid-cols-2 gap-3">
                {[
                  ["workflow", ":4101", "Agent Orchestration engine", "2GB / 1 CPU"],
                  ["umap", ":5001", "ML / semantic search", "2GB / 1 CPU"],
                  ["server", ":4100", "API gateway, WebSocket hub", "1GB / 0.5 CPU"],
                  ["unoverse", ":4105", "Node plane: package node execution", "1GB / 0.5 CPU"],
                  ["mcp-server", ":4103", "OpenAI Apps integration", "512MB / 0.25 CPU"],
                  ["canvas", ":3001", "Locode AI Agent builder UI", "256MB / 0.25 CPU"],
                ].map(([name, port, desc, resources]) => (
                  <div
                    key={name}
                    className="bg-white rounded-lg p-3 border-2 border-green-500 shadow-sm flex items-center justify-between"
                  >
                    <div>
                      <p className="font-bold text-green-800 text-sm">
                        {name} <span className="font-mono font-normal text-gray-400">{port}</span>
                      </p>
                      <p className="text-xs text-gray-500 mt-0.5">{desc}</p>
                    </div>
                    <p className="text-xs font-mono text-green-700 bg-green-50 rounded px-2 py-1 whitespace-nowrap ml-3">
                      {resources}
                    </p>
                  </div>
                ))}
              </div>
            </div>

            {/* Observability */}
            <div>
              <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">
                Observability Stack <span className="text-yellow-700">(bundled for POC only)</span>
              </p>
              <div className="grid grid-cols-3 gap-3">
                {[
                  ["Grafana", ":3000", "Dashboards & visualization"],
                  ["Loki", ":3100", "Log aggregation"],
                  ["Promtail", "", "Log shipping to Loki"],
                ].map(([name, port, desc]) => (
                  <div key={name} className="bg-white rounded-lg p-3 border-2 border-gray-300 text-center shadow-sm">
                    <p className="font-bold text-gray-700 text-sm">{name}</p>
                    <p className="text-xs font-mono text-gray-500 mt-0.5">{port}</p>
                    <p className="text-xs text-gray-500 mt-1">{desc}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* External dependencies */}
          <div className="mt-5">
            <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">
              Customer-Managed (External to VM)
            </p>
            <div className="grid grid-cols-2 gap-3">
              <div className="bg-gray-50 rounded-lg p-3 border-2 border-dashed border-gray-400 text-center">
                <p className="font-bold text-gray-700 text-sm">PostgreSQL</p>
                <p className="text-xs font-mono text-gray-500 mt-0.5">:5432</p>
                <p className="text-xs text-gray-500 mt-1">Managed by customer &middot; not deployed by Gravity</p>
              </div>
              <div className="bg-gray-50 rounded-lg p-3 border-2 border-dashed border-gray-400 text-center">
                <p className="font-bold text-gray-700 text-sm">Redis</p>
                <p className="text-xs font-mono text-gray-500 mt-0.5">:6379</p>
                <p className="text-xs text-gray-500 mt-1">Managed by customer &middot; not deployed by Gravity</p>
              </div>
            </div>
          </div>

          {/* Use case + warning */}
          <div className="mt-6 grid grid-cols-2 gap-4">
            <div className="bg-yellow-50 border-2 border-yellow-400 rounded-lg p-4">
              <h4 className="font-semibold text-yellow-800 mb-2">Use Case</h4>
              <ul className="text-sm text-gray-700 space-y-1">
                <li className="flex items-start gap-2">
                  <span className="text-yellow-600 font-bold">-</span>Internal demos
                </li>
                <li className="flex items-start gap-2">
                  <span className="text-yellow-600 font-bold">-</span>Development environments
                </li>
                <li className="flex items-start gap-2">
                  <span className="text-yellow-600 font-bold">-</span>Customer POC evaluations
                </li>
              </ul>
            </div>
            <div className="bg-red-50 border-2 border-red-300 rounded-lg p-4">
              <h4 className="font-semibold text-red-800 mb-2">Not for Production</h4>
              <ul className="text-sm text-gray-700 space-y-1">
                <li className="flex items-start gap-2">
                  <span className="text-red-500 font-bold">-</span>No high availability
                </li>
                <li className="flex items-start gap-2">
                  <span className="text-red-500 font-bold">-</span>No disaster recovery
                </li>
                <li className="flex items-start gap-2">
                  <span className="text-red-500 font-bold">-</span>Observability stack removed in production
                </li>
                <li className="flex items-start gap-2">
                  <span className="text-red-500 font-bold">-</span>Single point of failure
                </li>
              </ul>
            </div>
          </div>

          <p className="text-xs text-gray-400 text-right mt-6">
            Gravity Platform Architecture Specification v1.2 | CONFIDENTIAL
          </p>
        </div>
      );
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
