<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figure 6: Bottleneck Hierarchy &amp; Capacity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      @media print {
        body {
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
      }
    </style>
  </head>
  <body class="bg-white">
    <div id="root"></div>
    <script type="text/babel">
      const App = () => (
        <div className="max-w-6xl mx-auto p-8">
          <h2 className="text-2xl font-bold mb-6 text-gray-800 border-b-2 border-gray-300 pb-3">
            Figure 6: Bottleneck Hierarchy &amp; Capacity
          </h2>

          {/* Bottleneck Hierarchy */}
          <div className="bg-gray-50 border-2 border-gray-300 rounded-lg p-6 mb-8">
            <h3 className="font-bold text-gray-800 mb-5 text-lg">Bottleneck Hierarchy (ranked by impact)</h3>
            <div className="space-y-3">
              {[
                {
                  rank: 1,
                  label: "AI Provider Rate Limits",
                  desc: "OpenAI: 500-10,000 RPM (tier-dependent) | Bedrock: Region/model-dependent",
                  color: "bg-red-600",
                  width: "w-full",
                  note: "Almost always the real ceiling",
                },
                {
                  rank: 2,
                  label: "Database Connection Pool",
                  desc: "Prisma: 20 connections per App VM | ~1-5ms per query | 4,000-20,000 queries/sec per VM",
                  color: "bg-orange-500",
                  width: "w-5/6",
                  note: "Rarely saturated",
                },
                {
                  rank: 3,
                  label: "Memory (Orchestration Contexts)",
                  desc: "~50KB per active actor | 32GB VM = 600,000+ theoretical actors (50% = 300,000+)",
                  color: "bg-yellow-500",
                  width: "w-4/6",
                  note: "Huge headroom",
                },
                {
                  rank: 4,
                  label: "Node.js Event Loop",
                  desc: "Platform does orchestration (lightweight), not computation | CPU-heavy work offloaded to AI providers and UMAP",
                  color: "bg-green-500",
                  width: "w-3/6",
                  note: "Not a concern",
                },
                {
                  rank: 5,
                  label: "Redis",
                  desc: "Pub/sub for cross-instance messaging | Node registry lookups",
                  color: "bg-blue-500",
                  width: "w-2/6",
                  note: "Sub-millisecond, never the limit",
                },
              ].map(({ rank, label, desc, color, width, note }) => (
                <div key={rank} className="flex items-start gap-4">
                  <div className="flex-shrink-0 w-8 h-8 bg-gray-800 text-white rounded-full flex items-center justify-center font-bold text-sm">
                    {rank}
                  </div>
                  <div className="flex-1">
                    <div className={`${color} ${width} text-white p-3 rounded-lg`}>
                      <div className="flex justify-between items-start">
                        <div>
                          <p className="font-bold text-sm">{label}</p>
                          <p className="text-xs mt-1 opacity-90">{desc}</p>
                        </div>
                        <span className="text-xs bg-black bg-opacity-20 px-2 py-1 rounded ml-3 flex-shrink-0 whitespace-nowrap">
                          {note}
                        </span>
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Two tables side by side */}
          <div className="grid grid-cols-2 gap-6 mb-8">
            {/* Capacity per App VM */}
            <div className="bg-green-50 border-2 border-green-300 rounded-lg p-5">
              <h4 className="font-semibold text-green-800 mb-3">Capacity Per App VM (8 cores / 32 GB)</h4>
              <table className="w-full text-sm">
                <thead>
                  <tr className="bg-green-200">
                    <th className="p-2 text-left font-semibold">Resource</th>
                    <th className="p-2 text-right font-semibold">Capacity</th>
                  </tr>
                </thead>
                <tbody>
                  {[
                    ["WebSocket connections", "10,000+"],
                    ["Orchestration actors", "10,000+"],
                    ["Concurrent executions", "500-2,000"],
                    ["Workflows/min", "1,000-2,000"],
                    ["DB queries/sec", "4,000-20,000"],
                    ["HTTP API req/sec", "10,000+"],
                  ].map(([resource, capacity], i) => (
                    <tr key={i} className={i % 2 === 0 ? "bg-white" : "bg-green-50"}>
                      <td className="p-2 text-gray-700">{resource}</td>
                      <td className="p-2 text-right font-semibold text-gray-800">{capacity}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            {/* Latency Budget */}
            <div className="bg-blue-50 border-2 border-blue-300 rounded-lg p-5">
              <h4 className="font-semibold text-blue-800 mb-3">Latency Budget (Typical Workflow)</h4>
              <table className="w-full text-sm">
                <thead>
                  <tr className="bg-blue-200">
                    <th className="p-2 text-left font-semibold">Phase</th>
                    <th className="p-2 text-right font-semibold">Latency</th>
                  </tr>
                </thead>
                <tbody>
                  {[
                    ["WebSocket → Server", "< 1ms"],
                    ["Server → Workflow (HTTP)", "1-5ms"],
                    ["Route table lookup", "< 1ms"],
                    ["Core node execution", "1-10ms"],
                    ["Workflow → Unoverse", "2-10ms"],
                    ["AI API call", "500-5,000ms"],
                    ["Redis pub/sub delivery", "< 5ms"],
                    ["WebSocket → Client", "< 1ms"],
                  ].map(([phase, latency], i) => (
                    <tr key={i} className={i % 2 === 0 ? "bg-white" : "bg-blue-50"}>
                      <td className="p-2 text-gray-700">{phase}</td>
                      <td
                        className={`p-2 text-right font-mono ${phase.includes("AI API") ? "font-bold text-red-600" : "text-gray-800"}`}
                      >
                        {latency}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div className="mt-3 bg-blue-100 rounded p-2">
                <p className="text-xs text-blue-900 font-semibold">Total platform overhead: &lt; 30ms</p>
                <p className="text-xs text-blue-800">Excluding AI API calls</p>
              </div>
            </div>
          </div>

          {/* Sizing by Workload */}
          <div className="bg-gray-50 border-2 border-gray-200 rounded-lg p-5">
            <h4 className="font-semibold text-gray-800 mb-3">Sizing by Workload</h4>
            <table className="w-full text-sm">
              <thead>
                <tr className="bg-gray-200">
                  <th className="p-2 text-left font-semibold">Workload</th>
                  <th className="p-2 text-center font-semibold">App VM Spec</th>
                  <th className="p-2 text-center font-semibold">ML VM Spec</th>
                  <th className="p-2 text-center font-semibold">Users</th>
                  <th className="p-2 text-center font-semibold">Concurrent</th>
                  <th className="p-2 text-center font-semibold">Workflows/hr</th>
                </tr>
              </thead>
              <tbody>
                {[
                  ["Starter", "4c/16GB x2", "2c/8GB", "5,000+", "250-1,000", "30k-60k"],
                  ["Standard", "8c/32GB x2", "4c/16GB", "20,000+", "1,000-4,000", "120k-240k"],
                  ["Enterprise", "16c/64GB x2", "8c/32GB", "50,000+", "4,000-10,000", "500k-1M"],
                ].map(([workload, app, ml, users, concurrent, wfhr], i) => (
                  <tr
                    key={i}
                    className={`${i === 1 ? "bg-green-50 font-semibold" : i % 2 === 0 ? "bg-white" : "bg-gray-50"}`}
                  >
                    <td className="p-2 text-gray-800">
                      {workload}
                      {i === 1 && <span className="text-green-600 text-xs ml-1">(recommended)</span>}
                    </td>
                    <td className="p-2 text-center text-gray-700">{app}</td>
                    <td className="p-2 text-center text-gray-700">{ml}</td>
                    <td className="p-2 text-center text-gray-700">{users}</td>
                    <td className="p-2 text-center text-gray-700">{concurrent}</td>
                    <td className="p-2 text-center text-gray-700">{wfhr}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <p className="text-xs text-gray-500 mt-3">
              Note: The real-world bottleneck is almost always AI provider rate limits (OpenAI, Bedrock), not platform
              capacity.
            </p>
          </div>

          <p className="text-xs text-gray-400 text-right mt-6">
            Gravity Platform Architecture Specification v1.2 | CONFIDENTIAL
          </p>
        </div>
      );
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
