<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figure 3: Communication Flows</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
  </style>
</head>
<body class="bg-white">
  <div id="root"></div>
  <script type="text/babel">
    const Icon = ({ paths, size = 24, className = "", strokeWidth = 2 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
        fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round"
        strokeLinejoin="round" className={className}>
        {paths.map((d, i) => <path key={i} d={d} />)}
      </svg>
    );
    const Users = (p) => <Icon {...p} paths={["M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2","M9 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z","M22 21v-2a4 4 0 0 0-3-3.87","M16 3.13a4 4 0 0 1 0 7.75"]} />;
    const Server = (p) => <Icon {...p} paths={["M2 5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5z","M2 15a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-4z","M6 7h.01","M6 17h.01"]} />;
    const Database = (p) => <Icon {...p} paths={["M12 2C6.48 2 2 4.02 2 6.5V17.5C2 19.98 6.48 22 12 22C17.52 22 22 19.98 22 17.5V6.5C22 4.02 17.52 2 12 2Z","M2 6.5C2 8.98 6.48 11 12 11C17.52 11 22 8.98 22 6.5","M2 12C2 14.48 6.48 16.5 12 16.5C17.52 16.5 22 14.48 22 12"]} />;
    const Network = (p) => <Icon {...p} paths={["M12 2L2 7l10 5 10-5-10-5z","M2 17l10 5 10-5","M2 12l10 5 10-5"]} />;
    const ArrowRight = (p) => <Icon {...p} paths={["M5 12h14","M12 5l7 7-7 7"]} />;
    const ArrowDown = (p) => <Icon {...p} paths={["M12 5v14","M19 12l-7 7-7-7"]} />;

    const App = () => (
      <div className="max-w-6xl mx-auto p-8">
        <h2 className="text-2xl font-bold mb-6 text-gray-800 border-b-2 border-gray-300 pb-3">
          Figure 3: Communication Flows
        </h2>

        {/* A. End User Request Flow */}
        <div className="mb-8">
          <h3 className="font-bold text-gray-800 mb-4">A. End User Request Flow (Client App &rarr; API)</h3>
          <div className="flex items-center justify-between bg-sky-50 p-5 rounded-lg border-2 border-sky-300">
            <div className="text-center">
              <div className="bg-sky-500 text-white p-3 rounded-lg w-36 mx-auto">
                <Users size={24} className="mx-auto mb-1" />
                <p className="text-sm font-bold">Client App</p>
                <p className="text-xs">(Customer-hosted)</p>
              </div>
            </div>
            <ArrowRight size={32} className="text-sky-600" strokeWidth={3} />
            <div className="text-center">
              <div className="bg-blue-600 text-white p-3 rounded-lg w-32 mx-auto">
                <Network size={24} className="mx-auto mb-1" />
                <p className="text-sm font-bold">Load Bal.</p>
                <p className="text-xs">:443</p>
              </div>
            </div>
            <ArrowRight size={32} className="text-blue-600" strokeWidth={3} />
            <div className="text-center">
              <div className="bg-green-600 text-white p-3 rounded-lg w-32 mx-auto">
                <Server size={24} className="mx-auto mb-1" />
                <p className="text-sm font-bold">API Server</p>
                <p className="text-xs">:4100</p>
              </div>
            </div>
            <ArrowRight size={32} className="text-green-600" strokeWidth={3} />
            <div className="text-center">
              <div className="bg-orange-600 text-white p-3 rounded-lg w-32 mx-auto">
                <Database size={24} className="mx-auto mb-1" />
                <p className="text-sm font-bold">PostgreSQL</p>
                <p className="text-xs">:5432</p>
              </div>
            </div>
          </div>
        </div>

        {/* B. Workflow Execution */}
        <div className="mb-8">
          <h3 className="font-bold text-gray-800 mb-4">B. Workflow Execution with ML Service</h3>
          <div className="bg-green-50 p-5 rounded-lg border-2 border-green-300 space-y-3">
            <div className="flex items-center gap-3">
              <div className="bg-green-600 text-white px-4 py-2 rounded text-sm font-bold w-40 text-center">Workflow :4101</div>
              <ArrowRight className="text-purple-600" />
              <div className="bg-purple-600 text-white px-4 py-2 rounded text-sm font-bold">UMAP ML :5001</div>
              <span className="text-xs text-gray-600 ml-2">(when semantic search needed)</span>
            </div>
            <div className="flex items-center gap-3">
              <div className="bg-green-600 text-white px-4 py-2 rounded text-sm font-bold w-40 text-center">Workflow :4101</div>
              <ArrowRight className="text-green-700" />
              <div className="bg-green-700 text-white px-4 py-2 rounded text-sm font-bold">Unoverse :4106</div>
              <span className="text-xs text-gray-600 ml-2">(node runtime, HTTP + SSE for streaming nodes)</span>
            </div>
            <div className="flex items-center gap-3">
              <div className="bg-green-600 text-white px-4 py-2 rounded text-sm font-bold w-40 text-center">Workflow :4101</div>
              <ArrowRight className="text-orange-600" />
              <div className="bg-orange-600 text-white px-4 py-2 rounded text-sm font-bold">PostgreSQL :5432</div>
              <span className="text-xs text-gray-600 ml-2">(save execution state)</span>
            </div>
            <div className="flex items-center gap-3">
              <div className="bg-green-700 text-white px-4 py-2 rounded text-sm font-bold w-40 text-center">Unoverse :4106</div>
              <ArrowRight className="text-gray-600" />
              <div className="bg-gray-700 text-white px-4 py-2 rounded text-sm font-bold">AI Providers :443</div>
              <span className="text-xs text-gray-600 ml-2">(OpenAI, AWS Bedrock, etc.)</span>
            </div>
          </div>
        </div>

        {/* C. Cross-VM Messaging */}
        <div className="mb-6">
          <h3 className="font-bold text-gray-800 mb-4">C. Cross-VM WebSocket Messaging (Redis Pub/Sub)</h3>
          <div className="bg-red-50 p-6 rounded-lg border-2 border-red-300">
            <div className="grid grid-cols-5 gap-3 items-center text-center mb-4">
              <div className="bg-green-700 text-white p-3 rounded-lg">
                <p className="text-sm font-bold">Workflow</p>
                <p className="text-xs">(App VM 1)</p>
                <p className="text-xs mt-1 opacity-75">publishToClient()</p>
              </div>
              <div className="flex justify-center">
                <ArrowRight size={28} className="text-red-500" strokeWidth={3} />
              </div>
              <div className="bg-red-600 text-white p-3 rounded-lg">
                <p className="text-sm font-bold">Redis</p>
                <p className="text-xs">Pub/Sub :6379</p>
                <p className="text-xs mt-1 opacity-75 font-mono">gravity:client:userId:convId</p>
              </div>
              <div className="flex justify-center">
                <ArrowRight size={28} className="text-red-500" strokeWidth={3} />
              </div>
              <div className="bg-green-600 text-white p-3 rounded-lg">
                <p className="text-sm font-bold">Server</p>
                <p className="text-xs">(App VM 2)</p>
                <p className="text-xs mt-1 opacity-75">ws.send(message)</p>
              </div>
            </div>
            <div className="flex justify-end pr-6">
              <ArrowDown size={24} className="text-sky-500" />
            </div>
            <div className="flex justify-end mt-1 pr-2">
              <div className="bg-sky-500 text-white px-4 py-2 rounded-lg text-sm font-bold">
                Client receives message
              </div>
            </div>
            <div className="mt-5 bg-white p-3 rounded border border-red-200">
              <p className="text-xs text-gray-700"><strong>How it works:</strong> Server subscribes to Redis channel when client connects via WebSocket. Workflow publishes to Redis (not directly to WebSocket). Any Server instance holding the client's connection forwards the message. No sticky sessions required between client and workflow.</p>
            </div>
          </div>
        </div>

        <p className="text-xs text-gray-400 text-right mt-4">Gravity Platform Architecture Specification v1.2 | CONFIDENTIAL</p>
      </div>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
