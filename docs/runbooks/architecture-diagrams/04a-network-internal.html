<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figure 4a: External &amp; Internal Network</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
  </style>
</head>
<body class="bg-white">
  <div id="root"></div>
  <script type="text/babel">
    const Icon = ({ paths, size = 24, className = "", strokeWidth = 2 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
        fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round"
        strokeLinejoin="round" className={className}>
        {paths.map((d, i) => <path key={i} d={d} />)}
      </svg>
    );
    const Globe = (p) => <Icon {...p} paths={["M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z","M2 12h20","M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"]} />;
    const Network = (p) => <Icon {...p} paths={["M12 2L2 7l10 5 10-5-10-5z","M2 17l10 5 10-5","M2 12l10 5 10-5"]} />;

    const App = () => (
      <div className="max-w-6xl mx-auto p-8">
        <h2 className="text-2xl font-bold mb-6 text-gray-800 border-b-2 border-gray-300 pb-3">
          Figure 4a: External &amp; Internal Network
        </h2>

        <div className="space-y-6">
          {/* External */}
          <div className="border-2 border-blue-400 rounded-lg p-5 bg-blue-50">
            <h3 className="font-bold text-blue-800 mb-4 text-lg flex items-center gap-2">
              <Globe size={24} /> External (Load Balancer &rarr; App VMs)
            </h3>
            <div className="grid grid-cols-2 gap-4 text-sm">
              <div className="bg-white p-4 rounded shadow">
                <p className="font-bold text-gray-800 text-base">HTTPS (Port 443)</p>
                <p className="text-xs text-gray-600 mt-2">All API and UI traffic</p>
                <p className="text-xs text-gray-600">TLS 1.2+ | 2048-bit RSA minimum</p>
              </div>
              <div className="bg-white p-4 rounded shadow">
                <p className="font-bold text-gray-800 text-base">HTTP (Port 80)</p>
                <p className="text-xs text-gray-600 mt-2">Redirect to HTTPS only</p>
              </div>
            </div>
          </div>

          {/* Internal */}
          <div className="border-2 border-green-400 rounded-lg p-5 bg-green-50">
            <h3 className="font-bold text-green-800 mb-4 text-lg flex items-center gap-2">
              <Network size={24} /> Internal (VM to VM - Private Network)
            </h3>
            <div className="grid grid-cols-3 gap-4 text-sm">
              <div className="bg-white p-3 rounded shadow">
                <p className="font-bold text-gray-800">App VM &harr; App VM</p>
                <p className="text-xs text-gray-600 mt-1">Ports: 4100-4105 (HTTP)</p>
                <p className="text-xs text-gray-600">Service mesh communication</p>
              </div>
              <div className="bg-white p-3 rounded shadow">
                <p className="font-bold text-gray-800">App VM &rarr; ML VM</p>
                <p className="text-xs text-gray-600 mt-1">Port: 5001 (HTTP)</p>
                <p className="text-xs text-gray-600">UMAP service API calls</p>
              </div>
              <div className="bg-white p-3 rounded shadow">
                <p className="font-bold text-gray-800">ML VM &rarr; PostgreSQL</p>
                <p className="text-xs text-gray-600 mt-1">Port: 5432 (TLS)</p>
                <p className="text-xs text-gray-600">Model storage and metadata</p>
              </div>
              <div className="bg-white p-3 rounded shadow">
                <p className="font-bold text-gray-800">App VM &rarr; PostgreSQL</p>
                <p className="text-xs text-gray-600 mt-1">Port: 5432 (TLS required)</p>
                <p className="text-xs text-gray-600">Pool: 20 connections per VM</p>
              </div>
              <div className="bg-white p-3 rounded shadow">
                <p className="font-bold text-gray-800">App VM &rarr; Redis</p>
                <p className="text-xs text-gray-600 mt-1">Port: 6379 (TLS required)</p>
                <p className="text-xs text-gray-600">Pool: 10 connections per VM</p>
              </div>
            </div>
          </div>
        </div>

        {/* Port Summary Table */}
        <div className="mt-8 bg-gray-50 rounded-lg p-5 border border-gray-200">
          <h4 className="font-semibold text-gray-800 mb-4">Internal Port Summary</h4>
          <table className="w-full text-sm">
            <thead>
              <tr className="bg-gray-200">
                <th className="p-2 text-left font-semibold">Source</th>
                <th className="p-2 text-left font-semibold">Destination</th>
                <th className="p-2 text-center font-semibold">Port</th>
                <th className="p-2 text-center font-semibold">Protocol</th>
                <th className="p-2 text-left font-semibold">Purpose</th>
              </tr>
            </thead>
            <tbody>
              {[
                ["App VM", "App VM", "4100-4105", "HTTP", "Service mesh"],
                ["App VM", "ML VM", "5001", "HTTP", "UMAP API"],
                ["App VM", "PostgreSQL", "5432", "TCP/TLS", "Database"],
                ["App VM", "Redis", "6379", "TCP/TLS", "Cache / pub/sub"],
                ["ML VM", "PostgreSQL", "5432", "TCP/TLS", "Model storage"],
              ].map(([src, dst, port, proto, purpose], i) => (
                <tr key={i} className={i % 2 === 0 ? "bg-white" : "bg-gray-50"}>
                  <td className="p-2 text-gray-700">{src}</td>
                  <td className="p-2 text-gray-700">{dst}</td>
                  <td className="p-2 text-center font-mono text-gray-800">{port}</td>
                  <td className="p-2 text-center text-gray-600">{proto}</td>
                  <td className="p-2 text-gray-600">{purpose}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <p className="text-xs text-gray-400 text-right mt-4">Gravity Platform Architecture Specification v1.2 | CONFIDENTIAL</p>
      </div>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
