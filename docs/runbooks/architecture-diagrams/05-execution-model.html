<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figure 5: Execution Model - Agent Orchestration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      @media print {
        body {
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
      }
    </style>
  </head>
  <body class="bg-white">
    <div id="root"></div>
    <script type="text/babel">
      const Icon = ({ paths, size = 24, className = "", strokeWidth = 2 }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth={strokeWidth}
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          {paths.map((d, i) => (
            <path key={i} d={d} />
          ))}
        </svg>
      );
      const ArrowDown = (p) => <Icon {...p} paths={["M12 5v14", "M19 12l-7 7-7-7"]} />;
      const ArrowRight = (p) => <Icon {...p} paths={["M5 12h14", "M12 5l7 7-7 7"]} />;
      const Zap = (p) => <Icon {...p} paths={["M13 2L3 14h9l-1 10 10-12h-9l1-10z"]} />;

      const Step = ({ label, sublabel, color, timing }) => (
        <div className={`${color} text-white p-3 rounded-lg text-center`}>
          <p className="font-bold text-sm">{label}</p>
          {sublabel && <p className="text-xs mt-1 opacity-90">{sublabel}</p>}
          {timing && (
            <p className="text-xs mt-1 font-mono bg-black bg-opacity-20 rounded px-2 py-0.5 inline-block">{timing}</p>
          )}
        </div>
      );

      const App = () => (
        <div className="max-w-6xl mx-auto p-8">
          <h2 className="text-2xl font-bold mb-6 text-gray-800 border-b-2 border-gray-300 pb-3">
            Figure 5: Execution Model &mdash; Agent Orchestration
          </h2>

          <p className="text-sm text-gray-600 mb-6">
            Gravity uses direct in-process execution &mdash; not a job queue. Each workflow execution is an Agent
            Orchestration actor running in the Node.js event loop.
          </p>

          {/* Main Flow */}
          <div className="bg-gray-50 border-2 border-gray-300 rounded-lg p-6 mb-8">
            <h3 className="font-bold text-gray-800 mb-5 text-lg">Workflow Execution Flow</h3>

            <div className="flex flex-col items-center space-y-2">
              <Step label="Client sends message" sublabel="Browser / Client App" color="bg-sky-500" timing="< 1ms" />
              <ArrowDown size={28} className="text-gray-400" />
              <Step
                label="Server receives via WebSocket"
                sublabel="uWebSockets.js on :4100"
                color="bg-green-600"
                timing="< 1ms"
              />
              <ArrowDown size={28} className="text-gray-400" />
              <Step
                label="HTTP POST to Workflow service"
                sublabel="Internal :4101"
                color="bg-green-700"
                timing="1-5ms"
              />
              <ArrowDown size={28} className="text-gray-400" />

              <div className="bg-emerald-600 text-white p-4 rounded-lg text-center w-full max-w-lg">
                <div className="flex items-center justify-center gap-2 mb-2">
                  <Zap size={20} />
                  <p className="font-bold">DirectWorkflowExecutor creates orchestration actor</p>
                </div>
                <p className="text-xs opacity-90">
                  ~50KB memory per actor | State + context in memory | No serialization
                </p>
              </div>

              <ArrowDown size={28} className="text-gray-400" />
              <Step
                label="Actor starts, returns HTTP 200 immediately"
                sublabel="Non-blocking response"
                color="bg-emerald-700"
                timing="< 1ms"
              />
              <ArrowDown size={28} className="text-gray-400" />

              {/* Agent orchestration execution detail */}
              <div className="bg-white border-2 border-emerald-400 rounded-lg p-5 w-full max-w-2xl">
                <h4 className="font-bold text-emerald-800 mb-3 text-center">Agent orchestration runs in event loop</h4>
                <div className="space-y-2">
                  <div className="flex items-center gap-3">
                    <div className="bg-emerald-100 text-emerald-800 px-3 py-2 rounded text-xs font-bold w-48 text-center">
                      Signal routing
                    </div>
                    <ArrowRight size={20} className="text-gray-400" />
                    <p className="text-xs text-gray-600">Pre-computed route table (O(1) lookup)</p>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="bg-emerald-100 text-emerald-800 px-3 py-2 rounded text-xs font-bold w-48 text-center">
                      Core nodes
                    </div>
                    <ArrowRight size={20} className="text-gray-400" />
                    <p className="text-xs text-gray-600">Execute locally (DB access, 1-10ms)</p>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="bg-emerald-100 text-emerald-800 px-3 py-2 rounded text-xs font-bold w-48 text-center">
                      Package nodes
                    </div>
                    <ArrowRight size={20} className="text-gray-400" />
                    <p className="text-xs text-gray-600">HTTP (+SSE) to unoverse :4106 (Docker-internal)</p>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="bg-amber-100 text-amber-800 px-3 py-2 rounded text-xs font-bold w-48 text-center">
                      AI API calls
                    </div>
                    <ArrowRight size={20} className="text-gray-400" />
                    <p className="text-xs text-gray-600">
                      Async I/O &mdash; event loop is free while waiting (500ms-5s)
                    </p>
                  </div>
                </div>
              </div>

              <ArrowDown size={28} className="text-gray-400" />

              <div className="flex items-center gap-4">
                <Step
                  label="Results via Redis pub/sub"
                  sublabel="Cross-instance messaging"
                  color="bg-red-600"
                  timing="< 5ms"
                />
                <ArrowRight size={28} className="text-gray-400" />
                <Step label="WebSocket to Client" sublabel="uWebSockets.js" color="bg-sky-500" timing="< 1ms" />
              </div>
            </div>
          </div>

          {/* Why this is fast */}
          <div className="grid grid-cols-2 gap-6">
            <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-5">
              <h4 className="font-semibold text-emerald-800 mb-3">Why This Is Fast</h4>
              <ul className="text-sm text-gray-700 space-y-2">
                <li className="flex items-start gap-2">
                  <Zap size={16} className="text-emerald-600 mt-0.5 flex-shrink-0" />
                  <span>
                    <strong>Lightweight actors</strong> &mdash; state + context in memory, no serialization overhead
                    (~50KB each)
                  </span>
                </li>
                <li className="flex items-start gap-2">
                  <Zap size={16} className="text-emerald-600 mt-0.5 flex-shrink-0" />
                  <span>
                    <strong>All I/O is async</strong> &mdash; while one actor waits on AI API (500ms-5s), thousands of
                    others progress
                  </span>
                </li>
                <li className="flex items-start gap-2">
                  <Zap size={16} className="text-emerald-600 mt-0.5 flex-shrink-0" />
                  <span>
                    <strong>Pre-computed routes</strong> &mdash; signal routing is O(1), not graph traversal
                  </span>
                </li>
                <li className="flex items-start gap-2">
                  <Zap size={16} className="text-emerald-600 mt-0.5 flex-shrink-0" />
                  <span>
                    <strong>uWebSockets.js</strong> &mdash; handles HTTP + WebSocket at ~1M req/sec per process
                  </span>
                </li>
              </ul>
            </div>

            <div className="bg-amber-50 border-2 border-amber-300 rounded-lg p-5">
              <h4 className="font-semibold text-amber-800 mb-3">Key Insight</h4>
              <div className="bg-white rounded p-4 border border-amber-200">
                <p className="text-sm text-gray-800 font-semibold mb-2">Platform overhead is &lt; 30ms</p>
                <p className="text-xs text-gray-600 mb-3">
                  A workflow that takes 3 seconds is spending 99% of that time waiting on AI provider responses.
                </p>
                <p className="text-xs text-gray-600">
                  Scaling the platform does not reduce this &mdash; only AI provider tier upgrades or parallel execution
                  paths help.
                </p>
              </div>
              <div className="mt-4 bg-amber-100 rounded p-3">
                <p className="text-xs font-semibold text-amber-900 mb-1">Not a job queue:</p>
                <p className="text-xs text-gray-700">
                  No message broker, no worker pool, no serialization. Direct in-process Agent Orchestration.
                </p>
              </div>
            </div>
          </div>

          <p className="text-xs text-gray-400 text-right mt-6">
            Gravity Platform Architecture Specification v1.2 | CONFIDENTIAL
          </p>
        </div>
      );
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
