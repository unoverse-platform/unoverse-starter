<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figure 2: Standard Enterprise Deployment Architecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      @media print {
        body {
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
      }
    </style>
  </head>
  <body class="bg-white">
    <div id="root"></div>
    <script type="text/babel">
      const Icon = ({ paths, size = 24, className = "", strokeWidth = 2 }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth={strokeWidth}
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          {paths.map((d, i) => (
            <path key={i} d={d} />
          ))}
        </svg>
      );
      const Users = (p) => (
        <Icon
          {...p}
          paths={[
            "M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2",
            "M9 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z",
            "M22 21v-2a4 4 0 0 0-3-3.87",
            "M16 3.13a4 4 0 0 1 0 7.75",
          ]}
        />
      );
      const Cloud = (p) => <Icon {...p} paths={["M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"]} />;
      const ArrowDown = (p) => <Icon {...p} paths={["M12 5v14", "M19 12l-7 7-7-7"]} />;

      const App = () => (
        <div className="max-w-6xl mx-auto p-4">
          <h2 className="text-xl font-bold mb-3 text-gray-800 border-b-2 border-gray-300 pb-2">
            Figure 2: Standard Enterprise Deployment Architecture
          </h2>

          <div className="border-3 border-gray-400 rounded-lg p-4 bg-gray-50">
            <p className="text-center font-bold text-gray-700 mb-3 text-sm">CUSTOMER NETWORK</p>

            {/* Client App */}
            <div className="mb-3 bg-gradient-to-r from-sky-100 to-sky-50 border border-sky-400 rounded-lg p-2">
              <div className="flex items-center justify-center gap-2">
                <Users size={20} className="text-sky-600" />
                <div className="text-center">
                  <p className="font-bold text-sky-800 text-sm">Client App (SPA) - Customer-Hosted</p>
                  <p className="text-xs text-gray-600">Azure Static Web Apps / AWS S3+CloudFront / On-premises nginx</p>
                  <p className="text-xs text-blue-600 font-semibold mt-1">Public-facing | Customer infrastructure</p>
                </div>
              </div>
            </div>

            <div className="flex justify-center mb-2">
              <ArrowDown size={24} className="text-gray-500" />
            </div>

            {/* Load Balancer */}
            <div className="mb-3">
              <div className="bg-blue-600 text-white p-3 rounded-lg text-center max-w-2xl mx-auto">
                <div className="flex items-center justify-center gap-2">
                  <Cloud size={20} />
                  <div>
                    <p className="font-bold text-sm">Customer Load Balancer</p>
                    <p className="text-xs">F5 / HAProxy / AWS ALB | HTTPS:443</p>
                  </div>
                </div>
                <div className="mt-2 grid grid-cols-4 gap-1 text-xs">
                  <div className="bg-blue-800 p-1.5 rounded">
                    <p className="font-bold">domain.com</p>
                    <p className="text-blue-200">Canvas :3001</p>
                  </div>
                  <div className="bg-blue-800 p-1.5 rounded">
                    <p className="font-bold">api.domain.com</p>
                    <p className="text-blue-200">Server :4100</p>
                  </div>
                  <div className="bg-blue-800 p-1.5 rounded">
                    <p className="font-bold">mcp.domain.com</p>
                    <p className="text-blue-200">MCP :4103</p>
                  </div>
                  <div className="bg-blue-800 p-1.5 rounded">
                    <p className="font-bold">unoverse.domain.com</p>
                    <p className="text-blue-200">Unoverse :4105</p>
                  </div>
                </div>
              </div>
            </div>

            <div className="flex justify-center mb-2">
              <ArrowDown size={28} className="text-gray-400" strokeWidth={3} />
            </div>

            {/* App VMs */}
            <div className="grid grid-cols-2 gap-4 mb-4">
              {[1, 2].map((n) => (
                <div key={n} className="border-2 border-green-500 rounded-lg p-3 bg-green-50">
                  <div className="bg-green-600 text-white p-2 rounded-lg mb-2 text-center">
                    <h3 className="font-bold text-sm">APP-VM-{n}</h3>
                    <p className="text-xs">8 vCPU | 32 GB RAM | 200 GB SSD | Active/Active</p>
                  </div>
                  <div className="space-y-1 text-xs">
                    {[
                      ["server:4100", "API Gateway, WebSocket hub (2GB / 1 CPU)"],
                      ["workflow:4101", "Agent Orchestration engine (8GB / 4 CPU)"],
                      ["unoverse:4105", "Node plane; runtime :4106 internal (4GB / 2 CPU)"],
                      ["mcp-server:4103", "MCP integration (1GB / 0.5 CPU)"],
                    ].map(([name, desc]) => (
                      <div
                        key={name}
                        className="bg-white p-1.5 rounded border-l-3 border-green-600 flex justify-between items-center"
                      >
                        <p className="font-semibold">{name}</p>
                        <p className="text-gray-500">{desc}</p>
                      </div>
                    ))}
                    <div className="bg-indigo-100 p-1.5 rounded border-l-3 border-indigo-600 flex justify-between items-center">
                      <p className="font-semibold">canvas:3001</p>
                      <p className="text-gray-500">Locode AI Agent builder (512MB / 0.25 CPU)</p>
                    </div>
                  </div>
                  <div className="mt-1.5 bg-green-100 p-1 rounded text-xs text-center text-gray-600">
                    ~16 GB / 32 GB (50% utilization)
                  </div>
                </div>
              ))}
            </div>

            {/* Bottom row: ML VM, PostgreSQL, Redis */}
            <div className="grid grid-cols-3 gap-4">
              <div className="border-2 border-purple-500 rounded-lg p-3 bg-purple-50">
                <div className="bg-purple-600 text-white p-2 rounded-lg mb-2 text-center">
                  <h3 className="font-bold text-sm">ML-VM-1</h3>
                  <p className="text-xs">4 vCPU | 16 GB RAM | Dedicated</p>
                </div>
                <div className="bg-white p-2 rounded border-l-3 border-purple-600 text-xs">
                  <p className="font-semibold">umap-service:5001</p>
                  <p className="text-gray-600">ML models in memory (4GB / 2 CPU)</p>
                </div>
                <p className="mt-1.5 text-xs text-purple-800 font-semibold text-center">Single instance only</p>
              </div>

              <div className="border-2 border-orange-500 rounded-lg p-3 bg-orange-50">
                <div className="bg-orange-600 text-white p-2 rounded-lg mb-2 text-center">
                  <h3 className="font-bold text-sm">PostgreSQL 14+</h3>
                  <p className="text-xs font-bold">Customer-Managed</p>
                </div>
                <div className="text-xs space-y-1">
                  <div className="bg-white p-1.5 rounded">
                    <p className="text-gray-600">8 vCPU | 32 GB | 500 GB SSD | Multi-AZ</p>
                  </div>
                  <div className="bg-orange-100 p-1.5 rounded">
                    <p className="font-semibold">:5432 (TLS)</p>
                    <p className="text-gray-600">Workflows, users, execution history</p>
                  </div>
                </div>
              </div>

              <div className="border-2 border-red-500 rounded-lg p-3 bg-red-50">
                <div className="bg-red-600 text-white p-2 rounded-lg mb-2 text-center">
                  <h3 className="font-bold text-sm">Redis 6.0+</h3>
                  <p className="text-xs font-bold">Customer-Managed</p>
                </div>
                <div className="text-xs space-y-1">
                  <div className="bg-white p-1.5 rounded">
                    <p className="text-gray-600">8 GB Memory | Multi-AZ clustering</p>
                  </div>
                  <div className="bg-red-100 p-1.5 rounded">
                    <p className="font-semibold">:6379 (TLS)</p>
                    <p className="text-gray-600">Sessions, cache, pub/sub cross-VM</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* Key Points */}
          <div className="mt-4 bg-blue-50 border border-blue-300 rounded-lg p-3">
            <h3 className="font-semibold text-gray-800 mb-2 text-sm">Key Architecture Points:</h3>
            <div className="grid grid-cols-2 gap-x-4 gap-y-1 text-xs text-gray-700">
              <p>
                <strong className="text-blue-600">Client App:</strong> Customer-hosted (Azure/AWS/on-prem), NOT on
                platform VMs
              </p>
              <p>
                <strong className="text-indigo-600">Canvas UI:</strong> Internal admin/builder on App VMs (:3001)
              </p>
              <p>
                <strong className="text-green-600">App VMs:</strong> Active/Active, stateless, Redis pub/sub
                cross-instance
              </p>
              <p>
                <strong className="text-purple-600">ML VM:</strong> Single dedicated UMAP instance, cannot be duplicated
              </p>
              <p className="col-span-2">
                <strong className="text-orange-600">Total: 3 VMs</strong> (2 App + 1 ML) + customer-managed PostgreSQL
                &amp; Redis
              </p>
            </div>
          </div>

          <p className="text-xs text-gray-400 text-right mt-2">
            Gravity Platform Architecture Specification v1.2 | CONFIDENTIAL
          </p>
        </div>
      );
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
