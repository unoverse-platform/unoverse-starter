<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figure 8: Ansible Deployment Model</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
  </style>
</head>
<body class="bg-white">
  <div id="root"></div>
  <script type="text/babel">
    const Icon = ({ paths, size = 24, className = "", strokeWidth = 2 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
        fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round"
        strokeLinejoin="round" className={className}>
        {paths.map((d, i) => <path key={i} d={d} />)}
      </svg>
    );
    const ArrowRight = (p) => <Icon {...p} paths={["M5 12h14","M12 5l7 7-7 7"]} />;
    const ArrowDown = (p) => <Icon {...p} paths={["M12 5v14","M19 12l-7 7-7-7"]} />;

    const App = () => (
      <div className="max-w-6xl mx-auto p-8">
        <h2 className="text-2xl font-bold mb-6 text-gray-800 border-b-2 border-gray-300 pb-3">
          Figure 8: Ansible Deployment Model
        </h2>

        {/* Deployment Model: Core vs Customer */}
        <div className="grid grid-cols-2 gap-6 mb-8">
          <div className="border-2 border-blue-400 rounded-lg overflow-hidden">
            <div className="bg-blue-600 text-white p-4">
              <h3 className="font-bold text-lg">Core Platform</h3>
              <p className="text-sm opacity-90">Gravity's protected IP</p>
            </div>
            <div className="p-5 bg-blue-50">
              <div className="bg-white rounded p-3 border border-blue-200 mb-3">
                <p className="text-xs font-semibold text-blue-800 mb-1">Source:</p>
                <p className="text-xs text-gray-700 font-mono">registry.digitalocean.com/gravity-repo</p>
              </div>
              <div className="space-y-2">
                {["server", "workflow", "unoverse", "memory", "mcp-server", "canvas"].map(svc => (
                  <div key={svc} className="bg-blue-100 px-3 py-1.5 rounded text-xs font-semibold text-blue-800">{svc}</div>
                ))}
              </div>
              <div className="mt-3 bg-blue-100 rounded p-2">
                <p className="text-xs text-blue-900"><strong>Playbook:</strong> install.yml</p>
              </div>
            </div>
          </div>

          <div className="border-2 border-green-400 rounded-lg overflow-hidden">
            <div className="bg-green-600 text-white p-4">
              <h3 className="font-bold text-lg">Customer Packages</h3>
              <p className="text-sm opacity-90">Customer's own code</p>
            </div>
            <div className="p-5 bg-green-50">
              <div className="bg-white rounded p-3 border border-green-200 mb-3">
                <p className="text-xs font-semibold text-green-800 mb-1">Source:</p>
                <p className="text-xs text-gray-700 font-mono">Customer's git repo (gravity-starter fork)</p>
              </div>
              <div className="space-y-2">
                <div className="bg-green-100 px-3 py-1.5 rounded text-xs font-semibold text-green-800">packages/* (custom nodes)</div>
                <div className="bg-green-100 px-3 py-1.5 rounded text-xs font-semibold text-green-800">apps/design-system (components)</div>
              </div>
              <div className="mt-3 bg-green-100 rounded p-2">
                <p className="text-xs text-green-900"><strong>Playbook:</strong> deploy-packages.yml</p>
              </div>
              <div className="mt-2 bg-yellow-100 rounded p-2">
                <p className="text-xs text-yellow-800">unoverse can start without packages &mdash; it will have no custom nodes until deploy-packages.yml is run.</p>
              </div>
            </div>
          </div>
        </div>

        {/* Playbook Structure */}
        <div className="bg-gray-50 border-2 border-gray-300 rounded-lg p-6 mb-8">
          <h3 className="font-bold text-gray-800 mb-4 text-lg">Playbook Structure</h3>
          <div className="bg-white rounded-lg p-4 font-mono text-sm border border-gray-200">
            <p className="text-gray-500">ansible/</p>
            <p className="ml-4 text-gray-500">inventory/</p>
            <p className="ml-8 text-gray-600">production.yml <span className="text-xs text-red-500 font-sans">(gitignored)</span></p>
            <p className="ml-4 text-gray-500">playbooks/</p>
            {[
              ["install.yml", "Core platform services (DOCR images)"],
              ["deploy-packages.yml", "Customer packages (from git)"],
              ["install-umap.yml", "UMAP AI service"],
              ["install-observability.yml", "Grafana/Loki/Prometheus (POC only)"],
              ["upgrade.yml", "Pull new images, restart (rolling)"],
              ["rollback.yml", "Rollback to previous version"],
              ["health-check.yml", "Verify services healthy"],
              ["test-connectivity.yml", "Test ports and connectivity"],
              ["db-setup.yml", "Database table creation"],
              ["backup.yml", "Backup database"],
              ["restore.yml", "Restore from backup"],
              ["harden.yml", "Security hardening"],
            ].map(([file, desc]) => (
              <p key={file} className="ml-8">
                <span className="text-blue-700">{file}</span>
                <span className="text-xs text-gray-400 font-sans ml-2">{desc}</span>
              </p>
            ))}
            <p className="ml-4 text-gray-500">files/</p>
            <p className="ml-8 text-gray-600">.env.example <span className="text-xs text-gray-400 font-sans">| .env</span> <span className="text-xs text-red-500 font-sans">(gitignored)</span></p>
            <p className="ml-4 text-gray-500">templates/</p>
            <p className="ml-8 text-gray-600">Caddyfile.j2</p>
          </div>
        </div>

        {/* Installation Flow */}
        <div className="bg-blue-50 border-2 border-blue-300 rounded-lg p-6 mb-8">
          <h3 className="font-bold text-blue-800 mb-4 text-lg">Quick Start Installation Flow</h3>
          <div className="space-y-3">
            {[
              { step: 1, cmd: "install.yml", desc: "Core platform services (from DOCR)", color: "bg-blue-600" },
              { step: 2, cmd: "deploy-packages.yml", desc: "Customer packages (custom nodes, design system)", color: "bg-green-600" },
              { step: 3, cmd: "db-setup.yml", desc: "Database table creation", color: "bg-orange-600" },
              { step: 4, cmd: "harden.yml", desc: "Security hardening", color: "bg-gray-700" },
              { step: 5, cmd: "install-caddy.yml", desc: "TLS + reverse proxy (optional)", color: "bg-purple-600" },
              { step: 6, cmd: "test-connectivity.yml", desc: "Verify everything works", color: "bg-emerald-600" },
            ].map(({ step, cmd, desc, color }) => (
              <div key={step} className="flex items-center gap-4">
                <div className="w-8 h-8 bg-blue-800 text-white rounded-full flex items-center justify-center font-bold text-sm flex-shrink-0">{step}</div>
                <div className={`${color} text-white px-4 py-2 rounded text-sm font-bold font-mono w-56 text-center`}>{cmd}</div>
                <p className="text-sm text-gray-700">{desc}</p>
              </div>
            ))}
          </div>
        </div>

        {/* Upgrade & Rollback */}
        <div className="grid grid-cols-2 gap-6">
          <div className="bg-amber-50 border-2 border-amber-300 rounded-lg p-5">
            <h4 className="font-semibold text-amber-800 mb-3">Upgrade (Rolling)</h4>
            <div className="space-y-2 text-sm">
              <div className="bg-white rounded p-2 border border-amber-200">
                <p className="font-mono text-xs text-gray-700">ansible-playbook upgrade.yml</p>
              </div>
              <p className="text-xs text-gray-600">Pulls new images, restarts services with <code className="bg-gray-100 px-1 rounded">docker compose up -d</code></p>
              <p className="text-xs text-gray-600">Runs <code className="bg-gray-100 px-1 rounded">serial: 1</code> for rolling upgrades across multiple VMs</p>
              <div className="bg-amber-100 rounded p-2 mt-2">
                <p className="text-xs text-amber-900"><strong>Enterprise targeting:</strong></p>
                <p className="text-xs text-gray-700 font-mono mt-1">-l app_vms &nbsp;|&nbsp; -l ml_vms</p>
              </div>
            </div>
          </div>

          <div className="bg-red-50 border-2 border-red-300 rounded-lg p-5">
            <h4 className="font-semibold text-red-800 mb-3">Rollback</h4>
            <div className="space-y-2 text-sm">
              <div className="bg-white rounded p-2 border border-red-200">
                <p className="font-mono text-xs text-gray-700">ansible-playbook rollback.yml \</p>
                <p className="font-mono text-xs text-gray-700 ml-4">-e "rollback_version=v1.7.2"</p>
              </div>
              <p className="text-xs text-gray-600">Rolls back to a specific tagged version</p>
              <p className="text-xs text-gray-600">Same rolling strategy as upgrade</p>
            </div>
          </div>
        </div>

        <p className="text-xs text-gray-400 text-right mt-6">Gravity Platform Architecture Specification v1.2 | CONFIDENTIAL</p>
      </div>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
