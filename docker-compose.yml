version: "3.8"

# =============================================================================
# GRAVITY PLATFORM DOCKER COMPOSE
# =============================================================================
#
# LAYER 1: CORE PLATFORM (Pre-compiled via GitHub Actions → DOCR)
#   - server, workflow, canvas, umap, node-service
#   - Code protected, pulled as images
#   - node-service mounts ./packages for auto-discovery of custom nodes
#
# LAYER 2: CLIENT-SPECIFIC
#   - packages/ (custom nodes, design-system components)
#
# =============================================================================

services:
  # ===========================================================================
  # LAYER 1: CORE PLATFORM (DigitalOcean Container Registry)
  # ===========================================================================
  # Images pulled from: registry.digitalocean.com/gravity-repo/

  # Core Server - API gateway (lightweight - just routes requests)
  server:
    platform: linux/amd64
    image: registry.digitalocean.com/gravity-repo/gravity-server:latest
    ports:
      - "4100:4100"
    environment:
      - NODE_ENV=production
      - PORT=4100
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TLS=${REDIS_TLS}
      - REDIS_NAMESPACE=${REDIS_NAMESPACE}
      - AUTH_ISSUER=${AUTH_ISSUER}
      - AUTH_AUDIENCE=${AUTH_AUDIENCE}
      - WORKFLOW_SERVICE_URL=http://workflow:4101
      - NODE_SERVICE_URL=http://node-service:4102
    labels:
      - "com.docker.compose.service=server"
    # depends_on: redis - removed, services connect to REDIS_HOST from .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"

  # Workflow Engine - XState orchestration (heavy - manages state machines)
  workflow:
    platform: linux/amd64
    image: registry.digitalocean.com/gravity-repo/gravity-workflow:latest
    ports:
      - "4101:4101"
    environment:
      - NODE_ENV=production
      - PORT=4101
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TLS=${REDIS_TLS}
      - REDIS_NAMESPACE=${REDIS_NAMESPACE}
      - DATABASE_URL=${DATABASE_URL}
      - SERVER_WS_URL=ws://server:4100
      - NODE_SERVICE_URL=http://node-service:4102
      - UMAP_SERVICE_URL=http://umap:5001
    labels:
      - "com.docker.compose.service=workflow"
    # depends_on: redis - removed, services connect to REDIS_HOST from .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

  # Canvas UI - React frontend (lightweight - static files via nginx)
  # Runtime config injected via docker-entrypoint.sh at container start
  canvas:
    platform: linux/amd64
    image: registry.digitalocean.com/gravity-repo/gravity-canvas:latest
    ports:
      - "3001:80"
    environment:
      - VITE_API_URL=${API_URL:-http://server:4100}
      - VITE_SERVER_WS_URL=${VITE_SERVER_WS_URL:-ws://server:4100}
      - VITE_AUTH_ISSUER=${AUTH_ISSUER}
      - VITE_AUTH_CLIENT_ID=${AUTH_CLIENT_ID}
      - VITE_AUTH_AUDIENCE=${AUTH_AUDIENCE}
    depends_on:
      - server
      - node-service
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 64M
          cpus: "0.1"

  # UMAP Service - Python ML service
  umap:
    platform: linux/amd64
    image: registry.digitalocean.com/gravity-repo/gravity-umap:latest
    ports:
      - "5001:5001"
    volumes:
      - umap_models:/app/models
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"

  # Node Service - plugin execution (heavy - runs AI nodes, external API calls)
  # DOCR image with packages mounted at runtime for auto-discovery
  node-service:
    platform: linux/amd64
    image: registry.digitalocean.com/gravity-repo/gravity-node-service:latest
    # For local development, build from source instead:
    # build:
    #   context: .
    #   dockerfile: apps/node-service/Dockerfile
    #   args:
    #     - NODE_ENV=production
    ports:
      - "4102:4102"
    volumes:
      - ./packages:/app/packages # Mount packages for auto-discovery
    environment:
      - NODE_ENV=production
      - PORT=4102
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TLS=${REDIS_TLS}
      - REDIS_NAMESPACE=${REDIS_NAMESPACE}
      - SERVER_WS_URL=ws://server:4100
      - WORKFLOW_SERVICE_URL=http://workflow:4101
    labels:
      - "com.docker.compose.service=node-service"
    # depends_on: redis - removed, services connect to REDIS_HOST from .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.25"

  # MCP Server - OpenAI Apps integration (lightweight - HTTP server)
  mcp-server:
    platform: linux/amd64
    image: registry.digitalocean.com/gravity-repo/gravity-mcp-server:latest
    ports:
      - "4103:4103"
    environment:
      - NODE_ENV=production
      - DOMAIN=${DOMAIN}
      - WORKFLOW_SERVICE_URL=http://workflow:4101
      - AUTH_ISSUER=${AUTH_ISSUER}
      - AUTH_AUDIENCE=${AUTH_AUDIENCE}
    labels:
      - "com.docker.compose.service=mcp-server"
    depends_on:
      - server
      - workflow
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 128M
          cpus: "0.1"

  # ===========================================================================
  # OBSERVABILITY STACK (Logs, Traces, Metrics)
  # ===========================================================================

  loki:
    platform: linux/amd64
    image: registry.digitalocean.com/gravity-repo/gravity-loki:latest
    container_name: gravity-loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  promtail:
    platform: linux/amd64
    image: registry.digitalocean.com/gravity-repo/gravity-promtail:latest
    container_name: gravity-promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  grafana:
    platform: linux/amd64
    image: registry.digitalocean.com/gravity-repo/gravity-grafana:latest
    container_name: gravity-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

volumes:
  umap_models:
  loki_data:
  grafana_data:
