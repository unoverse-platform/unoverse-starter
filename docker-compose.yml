# =============================================================================
# GRAVITY PLATFORM DOCKER COMPOSE
# =============================================================================
#
# LAYER 1: CORE PLATFORM (Pre-compiled via GitHub Actions → DOCR)
#   - server, workflow, canvas, umap, unoverse, mcp-server, memory
#   - Code protected, pulled as images
#   - unoverse (the node plane) mounts ./packages for auto-discovery of custom nodes
#     (node-service is retired — unoverse absorbed it)
#
# LAYER 2: CLIENT-SPECIFIC
#   - packages/ (custom nodes, design-system components)
#
# OBSERVABILITY (optional, enabled via --profile observability):
#   - Grafana/Loki/Promtail (POC only)
#
# =============================================================================

services:
  # ===========================================================================
  # LAYER 1: CORE PLATFORM (DigitalOcean Container Registry)
  # ===========================================================================
  # Images pulled from: registry.digitalocean.com/gravity-repo/

  # Core Server - API gateway (lightweight - just routes requests)
  server:
    image: registry.digitalocean.com/gravity-repo/gravity-server:latest
    ports:
      - "4100:4100"
    volumes:
      - ./packages/design-system:/app/packages/design-system # Component bundles served to Canvas
    environment:
      - NODE_ENV=production
      - PORT=4100
      - DESIGN_SYSTEM_PATH=/app/packages/design-system
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TLS=${REDIS_TLS}
      - REDIS_NAMESPACE=${REDIS_NAMESPACE}
      - AUTH_ISSUER=${AUTH_ISSUER}
      - AUTH_AUDIENCE=${AUTH_AUDIENCE}
      - WORKFLOW_SERVICE_URL=http://workflow:4101
      # Internal Unoverse runtime (skills/prompt-blocks fetches) — server-to-server lane.
      - UNOVERSE_SERVICE_URL=http://unoverse:4106
    labels:
      - "com.docker.compose.service=server"
    # depends_on: redis - removed, services connect to REDIS_HOST from .env
    restart: unless-stopped

  # Workflow Engine - XState orchestration (heavy - manages state machines)
  workflow:
    image: registry.digitalocean.com/gravity-repo/gravity-workflow:latest
    ports:
      - "4101:4101"
    environment:
      - NODE_ENV=production
      - PORT=4101
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TLS=${REDIS_TLS}
      - REDIS_NAMESPACE=${REDIS_NAMESPACE}
      - DATABASE_URL=${DATABASE_URL}
      - SERVER_WS_URL=ws://server:4100
      - UMAP_SERVICE_URL=http://umap:5001
      # Internal Unoverse runtime port (ungated, never published) — the node catalog source.
      - UNOVERSE_SERVICE_URL=http://unoverse:4106
    labels:
      - "com.docker.compose.service=workflow"
    # Wait for Unoverse's catalog to be loaded before workflow pulls it (the old
    # node-service `nodes:ready` reload that covered this race was removed).
    depends_on:
      unoverse:
        condition: service_healthy
    restart: unless-stopped

  # Canvas UI - React frontend (lightweight - static files via nginx)
  # Runtime config injected via docker-entrypoint.sh at container start
  canvas:
    image: registry.digitalocean.com/gravity-repo/gravity-canvas:latest
    ports:
      - "3001:80"
    environment:
      - VITE_API_URL=${API_URL:-${DOMAIN:+https://api.${DOMAIN}}}
      - VITE_SERVER_WS_URL=${VITE_SERVER_WS_URL:-${DOMAIN:+wss://api.${DOMAIN}}}
      - VITE_AUTH_ISSUER=${AUTH_ISSUER}
      - VITE_AUTH_CLIENT_ID=${AUTH_CLIENT_ID}
      - VITE_AUTH_AUDIENCE=${AUTH_AUDIENCE}
      # Unoverse public URL (JWT-gated :4105) — the browser calls it directly for
      # component/template defs (MCP) and plugin management. Derived from DOMAIN
      # (Caddy route unoverse.<domain>) unless UNOVERSE_URL overrides it.
      - VITE_UNOVERSE_SERVICE_URL=${UNOVERSE_URL:-${DOMAIN:+https://unoverse.${DOMAIN}}}
      - MEMORY_SERVICE_URL=http://memory:4104
    depends_on:
      - server
      - unoverse
    restart: unless-stopped

  # UMAP Service - Python ML service
  umap:
    image: registry.digitalocean.com/gravity-repo/gravity-umap:latest
    ports:
      - "5001:5001"
    volumes:
      - umap_models:/app/models
    restart: unless-stopped

  # Unoverse - node plane (author·distribute·execute): the relocated node runtime +
  # workbench + MCP. TWO listeners:
  #   :4105 = PUBLIC (MCP + workbench), JWT-gated — published below.
  #   :4106 = INTERNAL node runtime (catalog + execute), UNGATED — deliberately NOT
  #           published. Only the Docker network reaches it; that isolation IS the
  #           trust boundary (workflow pulls its node catalog from here).
  unoverse:
    image: registry.digitalocean.com/gravity-repo/gravity-unoverse:latest
    # For local development, build from source instead:
    # build:
    #   context: .
    #   dockerfile: apps/unoverse/Dockerfile
    ports:
      - "4105:4105" # PUBLIC port only — do NOT add "4106:4106" (keep the runtime internal)
    environment:
      - NODE_ENV=production
      - UNOVERSE_WORKBENCH=0
      - UNOVERSE_PORT=4105
      - UNOVERSE_RUNTIME_PORT=4106
      - AUTH_ISSUER=${AUTH_ISSUER}
      - AUTH_AUDIENCE=${AUTH_AUDIENCE}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SERVER_WS_URL=ws://server:4100
      - WORKFLOW_SERVICE_URL=http://workflow:4101
      # Marketplace installs node packages here at runtime (npm) — nodes are NOT baked
      # into the image; only the core workflow nodes ship with the platform (in the
      # workflow image). This volume persists installs across restarts.
      - PLUGINS_DIR=/app/plugins
      # Legacy customer packages (Layer 2, deploy-packages.yml) — same mounts
      # node-service had, so customer-built nodes keep auto-discovering. The dist
      # bundles are CJS, so NODE_PATH resolves their hoisted deps.
      - PACKAGES_PATH=/app/host_packages
      - NODE_PATH=/app/host_node_modules
    volumes:
      - unoverse_plugins:/app/plugins
      - ./packages:/app/host_packages # Customer node packages (auto-discovery)
      - ./node_modules:/app/host_node_modules # Hoisted package deps
    healthcheck:
      # Ready = internal runtime port up (nodes are loaded into memory BEFORE it binds).
      test:
        ["CMD", "node", "-e", "fetch('http://127.0.0.1:4106/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    labels:
      - "com.docker.compose.service=unoverse"
    depends_on:
      - server
    restart: unless-stopped

  # MCP Server - OpenAI Apps integration (lightweight - HTTP server)
  mcp-server:
    image: registry.digitalocean.com/gravity-repo/gravity-mcp-server:latest
    ports:
      - "4103:4103"
    environment:
      - NODE_ENV=production
      - DOMAIN=${DOMAIN}
      - WORKFLOW_SERVICE_URL=http://workflow:4101
      - AUTH_ISSUER=${AUTH_ISSUER}
      - AUTH_AUDIENCE=${AUTH_AUDIENCE}
    labels:
      - "com.docker.compose.service=mcp-server"
    depends_on:
      - server
      - workflow
    restart: unless-stopped

  # Memory Server - Evidence-based user memory system (ambient pub/sub, Redis Streams)
  memory:
    image: registry.digitalocean.com/gravity-repo/gravity-memory:${TAG:-latest}
    ports:
      - "4104:4104"
    environment:
      - NODE_ENV=production
      - PORT=4104
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TLS=${REDIS_TLS}
      - REDIS_NAMESPACE=${REDIS_NAMESPACE}
      - AUTH_ISSUER=${AUTH_ISSUER}
      - AUTH_AUDIENCE=${AUTH_AUDIENCE}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WORKFLOW_SERVICE_URL=http://workflow:4101
    labels:
      - "com.docker.compose.service=memory"
    depends_on:
      - workflow
    restart: unless-stopped

  # ===========================================================================
  # OBSERVABILITY STACK (Logs, Traces, Metrics)
  # ===========================================================================

  loki:
    image: registry.digitalocean.com/gravity-repo/gravity-loki:latest
    container_name: gravity-loki
    profiles: [observability]
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    image: registry.digitalocean.com/gravity-repo/gravity-promtail:latest
    container_name: gravity-promtail
    profiles: [observability]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: registry.digitalocean.com/gravity-repo/gravity-grafana:latest
    container_name: gravity-grafana
    profiles: [observability]
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  umap_models:
  unoverse_plugins: # Marketplace-installed node packages (persisted across restarts)
  loki_data:
  grafana_data:
