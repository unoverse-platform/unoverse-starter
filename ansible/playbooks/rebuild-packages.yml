---
# Rebuild & Restart
# Rebuilds packages in-place on the server and restarts services.
# Use this after gravity update / git pull to pick up new components and nodes.
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/rebuild-packages.yml
#
# What it does:
#   1. npm install (sync dependencies)
#   2. Build plugin-base (dependency for all other packages)
#   3. Build all packages (custom nodes, design-system components)
#   4. Restart unoverse (loads new plugins)
#   5. Restart workflow + server (picks up new node definitions + component bundles)
#
# When to use:
#   - After gravity update (new components/nodes from starter repo)
#   - After git pull in /opt/gravity
#   - Components not showing in Canvas
#   - Custom nodes not loading in unoverse

- name: Rebuild Packages & Restart Services
  hosts: all
  become: yes

  vars:
    gravity_dir: /opt/gravity

  pre_tasks:
    - name: "Check gravity_dir exists"
      stat:
        path: "{{ gravity_dir }}/package.json"
      register: gravity_pkg

    - name: "Fail if gravity not installed"
      fail:
        msg: "{{ gravity_dir }}/package.json not found — run install.yml first"
      when: not gravity_pkg.stat.exists

  tasks:
    - name: "[1/4] Install dependencies"
      shell: |
        cd {{ gravity_dir }}
        npm install --no-audit --no-fund 2>&1 | tail -5
      register: install_result
      timeout: 120

    - name: "[2/4] Build packages"
      shell: |
        set -e
        cd {{ gravity_dir }}
        npm run build -w @gravity-platform/plugin-base 2>&1 | tail -3
        npm run build --workspaces --if-present 2>&1 | tail -5
      register: build_result
      timeout: 300

    - name: "[2/4] Build output"
      debug:
        msg: "{{ build_result.stdout_lines[-10:] | default(['done']) }}"

    - name: "[3/4] Restart unoverse"
      shell: docker compose -f {{ gravity_dir }}/docker-compose.yml restart unoverse
      register: ns_restart
      ignore_errors: yes

    - name: "[4/4] Restart workflow and server"
      shell: docker compose -f {{ gravity_dir }}/docker-compose.yml restart workflow server
      register: svc_restart
      ignore_errors: yes

    - name: "Wait 5s for services to stabilise"
      pause:
        seconds: 5

    - name: "Verify unoverse health"
      uri:
        url: "http://localhost:4105/health"
        status_code: 200
      register: ns_health
      retries: 10
      delay: 3
      ignore_errors: yes

    - name: "Verify server health"
      uri:
        url: "http://localhost:4100/health"
        status_code: 200
      register: server_health
      retries: 10
      delay: 3
      ignore_errors: yes

    - name: "=== REBUILD COMPLETE ==="
      debug:
        msg: |
          ============================================
          REBUILD & RESTART COMPLETE
          ============================================
          Build:        {{ 'OK' if build_result.rc == 0 else 'FAILED' }}
          unoverse:     {{ 'OK' if (ns_health.status | default(0)) == 200 else 'UNHEALTHY' }}
          server:       {{ 'OK' if (server_health.status | default(0)) == 200 else 'UNHEALTHY' }}
          ============================================
          If unoverse is UNHEALTHY:
            docker compose logs unoverse --tail 30
          If components still not in Canvas:
            docker compose restart server
