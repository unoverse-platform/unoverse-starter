---
# Test Connectivity — Full Platform Health Check
# Checks infrastructure AND application-level functionality
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/test-connectivity.yml

- name: Test Connectivity — Full Platform Health Check
  hosts: all
  become: yes

  tasks:
    # ── Infrastructure ──────────────────────────────────────────
    - name: "[1/9] Check Docker is running"
      command: docker info
      register: docker_info
      ignore_errors: yes

    - name: "[2/9] Check container status"
      shell: |
        cd /opt/gravity
        docker compose ps --format '{{ '{{' }}.Name{{ '}}' }} {{ '{{' }}.State{{ '}}' }} {{ '{{' }}.Status{{ '}}' }}' 2>/dev/null || echo "FAILED"
      register: container_status
      ignore_errors: yes

    - name: "[3/9] Check for restarting containers"
      shell: |
        cd /opt/gravity
        docker compose ps --format '{{ '{{' }}.Name{{ '}}' }} {{ '{{' }}.State{{ '}}' }}' 2>/dev/null | grep -i restart || echo "NONE"
      register: restarting_containers
      ignore_errors: yes

    # ── Ports ───────────────────────────────────────────────────
    - name: "[4/9] Test internal service ports"
      wait_for:
        host: localhost
        port: "{{ item.port }}"
        timeout: 5
      loop:
        - { name: "Canvas", port: 3001 }
        - { name: "Engine", port: 4101 }
        - { name: "Unoverse", port: 4105 }
        - { name: "Memory", port: 4104 }
        - { name: "UMAP", port: 5001 }
      register: port_checks
      ignore_errors: yes

    # ── External Dependencies ───────────────────────────────────
    - name: "[5/9] Test Redis connectivity (external)"
      shell: |
        REDIS_HOST=$(grep '^REDIS_HOST=' /opt/gravity/.env 2>/dev/null | cut -d'=' -f2-)
        REDIS_PORT=$(grep '^REDIS_PORT=' /opt/gravity/.env 2>/dev/null | cut -d'=' -f2-)
        REDIS_HOST=${REDIS_HOST:-localhost}
        REDIS_PORT=${REDIS_PORT:-6379}
        echo "host=${REDIS_HOST} port=${REDIS_PORT}"
        timeout 5 bash -c "echo PING | nc -w 3 ${REDIS_HOST} ${REDIS_PORT}" >/dev/null 2>&1
      register: redis_check
      ignore_errors: yes

    - name: "[6/9] Test database connectivity"
      shell: |
        DB_URL=$(grep '^DATABASE_URL=' /opt/gravity/.env 2>/dev/null | cut -d'=' -f2-)
        if [ -z "$DB_URL" ]; then
          echo "DATABASE_URL not set"
          exit 1
        fi
        # Extract host:port from postgresql://user:pass@host:port/db
        DB_HOSTPORT=$(echo "$DB_URL" | sed -E 's|.*@([^/]+)/.*|\1|')
        DB_HOST=$(echo "$DB_HOSTPORT" | cut -d: -f1)
        DB_PORT=$(echo "$DB_HOSTPORT" | cut -d: -f2)
        echo "host=${DB_HOST} port=${DB_PORT}"
        timeout 5 bash -c "echo | nc -w 3 ${DB_HOST} ${DB_PORT}" >/dev/null 2>&1
      register: db_check
      ignore_errors: yes

    # ── Health Endpoints ────────────────────────────────────────
    - name: "[7/9] Test service health endpoints"
      uri:
        url: "http://localhost:{{ item.port }}/health"
        status_code: 200
        timeout: 5
      loop:
        - { name: "Engine", port: 4101 }
        - { name: "Unoverse", port: 4105 }
        - { name: "Memory", port: 4104 }
        - { name: "UMAP", port: 5001 }
      register: health_checks
      ignore_errors: yes

    - name: "[7b/9] Test UMAP reachable from unoverse container (Docker DNS)"
      shell: |
        cd /opt/gravity
        RESULT=$(docker compose exec -T unoverse node -e "fetch('http://umap:5001/health').then(r=>r.json()).then(d=>console.log('OK: '+JSON.stringify(d))).catch(e=>console.log('FAILED: '+e.message))" 2>&1)
        echo "$RESULT"
        echo "$RESULT" | grep -q "OK:"
      register: umap_docker_check
      ignore_errors: yes

    # ── Application-Level Checks ────────────────────────────────
    - name: "[8/13] Test API endpoints (read)"
      shell: |
        RESPONSE=$(curl -s -w '\n%{http_code}' --max-time 10 http://localhost:{{ item.port }}{{ item.path }})
        STATUS=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | head -n -1)
        echo "HTTP $STATUS"
        [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]
      loop:
        # The engine surface (:4101) is the ungated internal API — the public
        # /api/* on :4105 is JWT-gated, so anonymous checks go here.
        - { name: "GET /workflows (engine)", port: 4101, path: "/workflows" }
        - { name: "GET /nodes (engine)", port: 4101, path: "/nodes" }
      register: api_checks
      ignore_errors: yes

    - name: "[8b/13] Test prompt blocks (internal :4106, from inside the container)"
      shell: |
        cd /opt/gravity
        RESULT=$(docker compose exec -T unoverse node -e \
          "fetch('http://127.0.0.1:4106/prompt-blocks').then(r=>r.json()).then(d=>console.log('blocks='+(Array.isArray(d)?d.length:(d.blocks||[]).length))).catch(e=>console.log('FAILED: '+e.message))" 2>&1)
        echo "$RESULT"
        echo "$RESULT" | grep -q "blocks="
      register: prompt_blocks_check
      ignore_errors: yes

    - name: "[9/13] Test API write (POST workflow)"
      shell: |
        RESPONSE=$(curl -s -w '\n%{http_code}' --max-time 10 \
          -X POST http://localhost:4101/workflows \
          -H 'Content-Type: application/json' \
          -d '{"name":"_health_check_test","nodes":[],"edges":[]}')
        STATUS=$(echo "$RESPONSE" | tail -1)
        echo "HTTP $STATUS"
        [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]
      register: api_write_check
      ignore_errors: yes

    - name: "[10/13] Check unoverse node catalog loaded"
      shell: |
        cd /opt/gravity
        # The internal :4106 runtime is Docker-network-only (never published), and the
        # public :4105 routes are JWT-gated — so read the catalog from INSIDE the
        # container. node:20-slim has no curl; use node fetch.
        NODE_COUNT=$(docker compose exec -T unoverse node -e \
          "fetch('http://127.0.0.1:4106/nodes').then(r=>r.json()).then(d=>console.log((d.nodes||[]).length)).catch(()=>console.log(0))" 2>/dev/null | tr -d ' \r')
        echo "nodes=${NODE_COUNT}"
        if [ "${NODE_COUNT:-0}" -eq 0 ] 2>/dev/null; then
          echo "WARNING: No nodes loaded — run deploy.sh rebuild or unoverse update"
          exit 1
        fi
      register: plugin_check
      ignore_errors: yes

    - name: "[11/13] Check packages directory mounted"
      shell: |
        cd /opt/gravity
        if docker compose exec -T unoverse ls /app/host_packages 2>/dev/null | head -5; then
          PKG_COUNT=$(docker compose exec -T unoverse ls /app/host_packages 2>/dev/null | wc -l | tr -d ' ')
          echo "packages_mounted=${PKG_COUNT}"
          [ "$PKG_COUNT" -gt 0 ]
        else
          echo "packages_mounted=0"
          echo "WARNING: No packages directory — run deploy.sh or unoverse update"
          exit 1
        fi
      register: packages_check
      ignore_errors: yes

    - name: "[12/13] Check for errors in service logs"
      shell: |
        cd /opt/gravity
        ERRORS=$(docker compose logs --tail=50 --since=5m 2>&1 | grep -iE 'error|fatal|panic|does not exist|ECONNREFUSED' | grep -v 'NOGROUP' | tail -10)
        if [ -n "$ERRORS" ]; then
          echo "$ERRORS"
          exit 1
        else
          echo "No recent errors"
        fi
      register: log_errors
      ignore_errors: yes

    # ── Caddy / Domain ────────────────────────────────────────────
    - name: "[13/15] Test external connectivity (if Caddy installed)"
      wait_for:
        host: localhost
        port: "{{ item }}"
        timeout: 5
      loop: [80, 443]
      register: caddy_ports
      ignore_errors: yes

    - name: "[14/15] Read DOMAIN from .env"
      shell: grep '^DOMAIN=' /opt/gravity/.env 2>/dev/null | cut -d'=' -f2-
      register: domain_value
      ignore_errors: yes

    - name: "[15/15] Test public domain endpoints (if DOMAIN set)"
      shell: |
        RESULT=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 -k https://{{ item.sub }}{{ domain_value.stdout }}{{ item.path }} 2>/dev/null)
        echo "HTTP $RESULT"
        [ "$RESULT" -ge 200 ] && [ "$RESULT" -lt 500 ]
      loop:
        - { name: "Canvas", sub: "", path: "/" }
        - { name: "API Server", sub: "api.", path: "/health" }
        - { name: "Unoverse", sub: "unoverse.", path: "/health" }
      register: domain_checks
      ignore_errors: yes
      when: domain_value.stdout | default('') | length > 0 and domain_value.stdout != 'example.com'

  post_tasks:
    - name: "=== PLATFORM HEALTH CHECK ==="
      debug:
        msg: |
          ============================================
          PLATFORM HEALTH CHECK
          ============================================
          Host: {{ inventory_hostname }} ({{ ansible_host }})

          ── Infrastructure ──
          Docker: {{ 'OK' if docker_info.rc == 0 else 'FAILED' }}

          Containers:
          {% for line in container_status.stdout_lines %}
            {{ line }}
          {% endfor %}

          Restarting: {{ restarting_containers.stdout | trim }}

          ── Ports ──
          {% for result in port_checks.results %}
            - {{ result.item.name }} ({{ result.item.port }}): {{ 'OK' if not result.failed else 'CLOSED' }}
          {% endfor %}

          ── External Dependencies ──
          Redis: {{ 'REACHABLE' if redis_check.rc == 0 else 'UNREACHABLE' }}
            {{ redis_check.stdout_lines[0] | default('') }}
          Database: {{ 'REACHABLE' if db_check.rc == 0 else 'UNREACHABLE' }}
            {{ db_check.stdout_lines[0] | default('') }}

          ── Health Endpoints ──
          {% for result in health_checks.results %}
            - {{ result.item.name }}: {{ 'OK' if not result.failed else 'FAILED' }}
          {% endfor %}

          ── UMAP (Docker DNS) ──
          Unoverse → umap:5001: {{ 'OK' if umap_docker_check.rc == 0 else 'FAILED — run install-umap.yml' }}

          ── API Endpoints (read) ──
          {% for result in api_checks.results %}
            - {{ result.item.name }}: {{ result.stdout | default('???') if not result.failed else 'FAILED (' + result.stdout | default('???') + ')' }}
          {% endfor %}

          ── API Write Test ──
            - POST /workflows (engine): {{ api_write_check.stdout | default('???') if not api_write_check.failed else 'FAILED (' + api_write_check.stdout | default('???') + ')' }}

          ── Prompt Blocks (internal :4106) ──
            {{ prompt_blocks_check.stdout_lines[0] | default('(skipped)') }}

          ── Plugins & Packages ──
          Unoverse: {{ plugin_check.stdout_lines[0] | default('(skipped)') }}
          {{ plugin_check.stdout_lines[1] | default('') }}
          Packages: {{ packages_check.stdout_lines[0] | default('(skipped)') }}
          {{ packages_check.stdout_lines[1] | default('') }}

          ── Recent Errors in Logs ──
          {{ log_errors.stdout | default('(skipped)') }}

          ── Caddy ──
            - Port 80: {{ 'OK' if not caddy_ports.results[0].failed else 'CLOSED' }}
            - Port 443: {{ 'OK' if not caddy_ports.results[1].failed else 'CLOSED' }}

          ── Public Domain ──
          {% if domain_value.stdout | default('') | length > 0 and domain_value.stdout != 'example.com' %}
          Domain: {{ domain_value.stdout }}
          {% if domain_checks is defined and domain_checks.results is defined %}
          {% for result in domain_checks.results %}
            - https://{{ result.item.sub }}{{ domain_value.stdout }}{{ result.item.path }}: {{ result.stdout | default('SKIPPED') if not result.failed | default(true) else 'FAILED' }}
          {% endfor %}
          {% endif %}
          {% else %}
          Domain: NOT SET (set DOMAIN= in .env to enable public URL checks)
          {% endif %}
          ============================================
