---
# Caddy Reverse Proxy Uninstallation Playbook
# Removes Caddy when customer has their own load balancer
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/uninstall-caddy.yml

- name: Uninstall Caddy Reverse Proxy
  hosts: all
  become: yes

  tasks:
    - name: "[1/3] Stop Caddy service"
      service:
        name: caddy
        state: stopped
        enabled: no
      ignore_errors: yes

    - name: "[2/3] Remove Caddy package (Debian/Ubuntu)"
      apt:
        name: caddy
        state: absent
        purge: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: "[2/3] Remove Caddy package (RHEL/Amazon Linux)"
      dnf:
        name: caddy
        state: absent
      when: ansible_facts['os_family'] == "RedHat"

    - name: "[3/3] Remove Caddy repository (Debian/Ubuntu)"
      file:
        path: /etc/apt/sources.list.d/caddy-stable.list
        state: absent
      when: ansible_facts['os_family'] == "Debian"

    - name: "[3/3] Remove Caddy GPG key (Debian/Ubuntu)"
      file:
        path: /usr/share/keyrings/caddy-stable-archive-keyring.gpg
        state: absent
      when: ansible_facts['os_family'] == "Debian"

    - name: "[3/3] Remove Caddy COPR repo (RHEL/Amazon Linux)"
      command: dnf copr remove -y @caddy/caddy
      ignore_errors: yes
      when: ansible_facts['os_family'] == "RedHat"

  post_tasks:
    - name: "=== CADDY UNINSTALLATION COMPLETE ==="
      debug:
        msg: |
          ============================================
          CADDY REMOVED
          ============================================
          Host: {{ inventory_hostname }} ({{ ansible_host }})

          Caddy has been uninstalled.

          Configure your load balancer to route (by hostname):
            - Port 443 → Canvas (3001)
            - Port 443 → API (4100)
            - Port 443 → MCP (4103)
            - Port 443 → Unoverse (4105)
          Notes: SAB is CDN-deployed (no platform route). The memory
          dashboard (4104) stays internal (SSH tunnel only); route only
          the root-domain /mem-api/* rewrite if the client app needs it.
          ============================================
