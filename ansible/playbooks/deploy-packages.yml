---
# Deploy Customer Packages
# Rsyncs packages/ and apps/design-system/ from local machine to server,
# builds them, and restarts unoverse (the node plane).
#
# Usage (via gravity CLI — recommended):
#   gravity deploy packages
#
# Usage (direct ansible):
#   ansible-playbook -i inventory/production.yml playbooks/deploy-packages.yml

- name: Deploy Customer Packages
  hosts: all
  become: yes

  vars:
    gravity_dir: /opt/gravity
    local_root: "{{ playbook_dir }}/../.."

  pre_tasks:
    - name: "[0/5] Ensure rsync is installed"
      package:
        name: rsync
        state: present
      become: yes

  tasks:
    - name: "[1/5] Sync packages/ to server"
      ansible.posix.synchronize:
        src: "{{ local_root }}/packages/"
        dest: "{{ gravity_dir }}/packages/"
        delete: yes
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=.turbo"
          - "--exclude=dist"
          - "--exclude=.DS_Store"
          - "--exclude=*.swp"
          - "--exclude=*.log"

    - name: "[2/5] Sync apps/design-system/ to server"
      ansible.posix.synchronize:
        src: "{{ local_root }}/apps/design-system/"
        dest: "{{ gravity_dir }}/apps/design-system/"
        delete: yes
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=.turbo"
          - "--exclude=dist"
          - "--exclude=.storybook-index"
          - "--exclude=.DS_Store"
          - "--exclude=*.swp"
          - "--exclude=*.log"

    - name: "[3/5] Sync workspace config files"
      copy:
        src: "{{ item }}"
        dest: "{{ gravity_dir }}/{{ item | basename }}"
        owner: "{{ ansible_user }}"
        mode: "0644"
      loop:
        - "{{ local_root }}/package.json"
        - "{{ local_root }}/turbo.json"
        - "{{ local_root }}/tsconfig.base.json"
      loop_control:
        label: "{{ item | basename }}"
      ignore_errors: yes

    - name: "[4/5] Build packages"
      shell: |
        set -e
        cd {{ gravity_dir }}
        npm install --no-audit --no-fund 2>&1 | tail -3
        npx turbo run build 2>&1 | tail -10
      register: build_result
      timeout: 300

    - name: "[4/5] Build output"
      debug:
        msg: "{{ build_result.stdout_lines[-10:] | default(['done']) }}"

    - name: "[5/5] Restart unoverse (reloads customer node packages)"
      shell: |
        cd {{ gravity_dir }}
        docker compose restart unoverse 2>&1
      register: restart_result
      ignore_errors: yes

    - name: "=== PACKAGES DEPLOYED ==="
      debug:
        msg: |
          ============================================
          PACKAGES DEPLOYED
          ============================================
          Build:   {{ 'OK' if build_result.rc == 0 else 'FAILED' }}
          Restart: {{ 'OK' if restart_result.rc == 0 else 'FAILED' }}
          ============================================
