---
# Deploy Developer Carve-Out
# Rsyncs the three developer-editable folders (apps/unoverse/{nodes,rx,prompts})
# from the local machine to the server, builds them, and restarts unoverse.
#
# Usage (via CLI — recommended):
#   unoverse deploy packages
#
# Usage (direct ansible):
#   ansible-playbook -i inventory/production.yml playbooks/deploy-packages.yml

- name: Deploy Developer Carve-Out
  hosts: all
  become: yes

  vars:
    gravity_dir: /opt/gravity
    local_root: "{{ playbook_dir }}/../.."

  pre_tasks:
    - name: "[0/4] Ensure rsync is installed"
      package:
        name: rsync
        state: present
      become: yes

  tasks:
    - name: "[1/4] Sync developer folders (nodes, rx, prompts) to server"
      ansible.posix.synchronize:
        src: "{{ local_root }}/apps/unoverse/{{ item }}/"
        dest: "{{ gravity_dir }}/apps/unoverse/{{ item }}/"
        delete: yes
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=.turbo"
          - "--exclude=dist"
          - "--exclude=.DS_Store"
          - "--exclude=*.swp"
          - "--exclude=*.log"
      loop:
        - nodes
        - rx
        - prompts

    - name: "[2/4] Sync workspace config files"
      copy:
        src: "{{ item }}"
        dest: "{{ gravity_dir }}/{{ item | basename }}"
        owner: "{{ ansible_user }}"
        mode: "0644"
      loop:
        - "{{ local_root }}/package.json"
        - "{{ local_root }}/turbo.json"
        - "{{ local_root }}/tsconfig.base.json"
      loop_control:
        label: "{{ item | basename }}"
      ignore_errors: yes

    - name: "[3/4] Build packages"
      shell: |
        set -e
        cd {{ gravity_dir }}
        npm install --no-audit --no-fund 2>&1 | tail -3
        npx turbo run build 2>&1 | tail -10
      register: build_result
      timeout: 300

    - name: "[3/4] Build output"
      debug:
        msg: "{{ build_result.stdout_lines[-10:] | default(['done']) }}"

    - name: "[4/4] Restart unoverse (reloads customer node packages)"
      shell: |
        cd {{ gravity_dir }}
        docker compose restart unoverse 2>&1
      register: restart_result
      ignore_errors: yes

    - name: "=== CARVE-OUT DEPLOYED ==="
      debug:
        msg: |
          ============================================
          DEVELOPER CARVE-OUT DEPLOYED (nodes, rx, prompts)
          ============================================
          Build:   {{ 'OK' if build_result.rc == 0 else 'FAILED' }}
          Restart: {{ 'OK' if restart_result.rc == 0 else 'FAILED' }}
          ============================================
