---
# Component nodes ON the production server — DEFINITION-BACKED (no generation).
#
# One universal executor serves every design component; node definitions are
# synthesized from the deployed rx/components/* at boot. There is NO nodegen step:
# adding or editing a component definition only needs the restart below. The build
# step compiles the small hand-written package (apps/unoverse/nodes/components)
# only when its dist/ is missing (fresh server / package source change).
#
# Prereq: the rx/ defs must already be on the server (run `unoverse deploy` / `deploy
# packages` first — that rsyncs apps/unoverse/{nodes,rx,prompts}).
#
# Usage:
#   ansible-playbook -i inventory playbooks/gendesign.yml

- name: Component nodes on the server (definition-backed)
  hosts: all
  become: yes

  vars:
    gravity_dir: /opt/gravity

  tasks:
    # tsc ignores NODE_PATH and the pruned image links no plugin-base — the only built
    # copy is in the plugins volume. Symlink it into node_modules so tsc resolves it,
    # then compile. ALWAYS build: deploy-packages rsyncs SOURCE with dist excluded
    # (and --delete never removes excluded dest files), so a stale dist can survive a
    # deploy — a skip-if-present here would silently run old executor code. The build
    # is a small tsc (seconds). Component DEFINITION changes still need no build at
    # all — they synthesize from rx/ at boot.
    - name: "[1/2] Build the universal component-node package (tsc — always, dist may be stale)"
      shell: |
        cd {{ gravity_dir }}
        docker compose exec -T unoverse sh -c '
          if [ ! -d /app/plugins/node_modules/@unoverse-platform/plugin-base ]; then
            echo "plugin-base not installed in the plugins volume — run: unoverse deploy marketplace"; exit 1
          fi
          mkdir -p /app/node_modules/@unoverse-platform
          ln -sfn /app/plugins/node_modules/@unoverse-platform/plugin-base /app/node_modules/@unoverse-platform/plugin-base
          cd /app/apps/unoverse/nodes/components && npm run build
        ' 2>&1 | tail -15
      register: build_result

    - name: "[1/2] build output"
      debug:
        msg: "{{ build_result.stdout_lines[-15:] | default(['done']) }}"

    - name: "[2/2] Restart unoverse (definitions re-synthesize from rx/components)"
      shell: |
        cd {{ gravity_dir }}
        docker compose restart unoverse 2>&1
      register: restart_result

    - name: "=== GENDESIGN COMPLETE ==="
      debug:
        msg: |
          ============================================
          COMPONENT NODES LIVE (DEFINITION-BACKED)
          ============================================
          Host:    {{ inventory_hostname }} ({{ ansible_host }})
          Build:   {{ 'OK' if build_result.rc == 0 else 'FAILED' }}
          Restart: {{ 'OK' if restart_result.rc == 0 else 'FAILED' }}
          ============================================
