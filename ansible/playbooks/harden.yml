---
# Gravity Platform VM Hardening Playbook
# Enterprise security hardening for production VMs

- name: Harden VM for Enterprise Deployment
  hosts: all
  become: yes

  vars:
    # SSH hardening
    ssh_port: 22
    ssh_permit_root_login: "no"
    ssh_password_authentication: "no"

    # Firewall ports (customize per host group)
    allowed_ports:
      - { port: 22, proto: tcp } # SSH
      - { port: 80, proto: tcp } # HTTP (redirect to HTTPS)
      - { port: 443, proto: tcp } # HTTPS

    # Internal ports (only from load balancer / internal network)
    internal_ports:
      - { port: 4100, proto: tcp } # server
      - { port: 4101, proto: tcp } # workflow
      - { port: 4103, proto: tcp } # mcp-server
      - { port: 4104, proto: tcp } # memory
      - { port: 4105, proto: tcp } # unoverse (public MCP/plugins, JWT-gated in-app)
      # 4106 (unoverse internal node runtime) is NOT listed: compose never publishes
      # it to the host, so there is nothing to firewall — Docker-network-only.
      - { port: 5001, proto: tcp } # umap
      - { port: 3001, proto: tcp } # canvas
      - { port: 3007, proto: tcp } # sab

  tasks:
    # =========================================================================
    # SYSTEM UPDATES
    # =========================================================================
    - name: Update all packages (Debian/Ubuntu)
      apt:
        upgrade: safe
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_facts['os_family'] == "Debian"

    - name: Update all packages (RHEL/Amazon Linux)
      dnf:
        name: "*"
        state: latest
        security: yes
      when: ansible_facts['os_family'] == "RedHat"

    - name: Install security packages (Debian/Ubuntu)
      apt:
        name:
          - ufw
          - fail2ban
          - unattended-upgrades
          - logrotate
        state: present
      when: ansible_facts['os_family'] == "Debian"

    - name: Install security packages (RHEL/Amazon Linux)
      dnf:
        name:
          - firewalld
          - fail2ban
          - dnf-automatic
          - logrotate
          - audit
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    # =========================================================================
    # SSH HARDENING
    # =========================================================================
    - name: Configure SSH - Disable root login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin {{ ssh_permit_root_login }}"
      notify: Restart SSH

    - name: Configure SSH - Disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication {{ ssh_password_authentication }}"
      notify: Restart SSH

    - name: Configure SSH - Use only SSH protocol 2
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?Protocol"
        line: "Protocol 2"
      notify: Restart SSH

    - name: Configure SSH - Set login grace time
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?LoginGraceTime"
        line: "LoginGraceTime 60"
      notify: Restart SSH

    - name: Configure SSH - Limit max auth tries
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?MaxAuthTries"
        line: "MaxAuthTries 3"
      notify: Restart SSH

    # =========================================================================
    # FIREWALL (UFW - Debian/Ubuntu)
    # =========================================================================
    - name: Reset UFW to default
      ufw:
        state: reset
      when: ansible_facts['os_family'] == "Debian"

    - name: Set UFW default policy - deny incoming
      ufw:
        direction: incoming
        policy: deny
      when: ansible_facts['os_family'] == "Debian"

    - name: Set UFW default policy - allow outgoing
      ufw:
        direction: outgoing
        policy: allow
      when: ansible_facts['os_family'] == "Debian"

    - name: Allow SSH (UFW)
      ufw:
        rule: allow
        port: "{{ ssh_port }}"
        proto: tcp
      when: ansible_facts['os_family'] == "Debian"

    - name: Allow public ports (UFW)
      ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
      loop: "{{ allowed_ports }}"
      when: ansible_facts['os_family'] == "Debian"

    - name: Allow internal ports from private network (UFW)
      ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
        from_ip: "10.0.0.0/8"
      loop: "{{ internal_ports }}"
      when: ansible_facts['os_family'] == "Debian" and (restrict_internal_ports | default(true))

    - name: Enable UFW
      ufw:
        state: enabled
      when: ansible_facts['os_family'] == "Debian"

    # =========================================================================
    # FIREWALL (firewalld - RHEL/Amazon Linux)
    # =========================================================================
    - name: Start firewalld
      service:
        name: firewalld
        state: started
        enabled: yes
      when: ansible_facts['os_family'] == "RedHat"

    - name: Allow SSH (firewalld)
      firewalld:
        port: "{{ ssh_port }}/tcp"
        permanent: yes
        state: enabled
      when: ansible_facts['os_family'] == "RedHat"

    - name: Allow public ports (firewalld)
      firewalld:
        port: "{{ item.port }}/{{ item.proto }}"
        permanent: yes
        state: enabled
      loop: "{{ allowed_ports }}"
      when: ansible_facts['os_family'] == "RedHat"

    - name: Allow internal ports from private network (firewalld)
      firewalld:
        rich_rule: 'rule family="ipv4" source address="10.0.0.0/8" port port="{{ item.port }}" protocol="{{ item.proto }}" accept'
        permanent: yes
        state: enabled
      loop: "{{ internal_ports }}"
      when: ansible_facts['os_family'] == "RedHat" and (restrict_internal_ports | default(true))

    - name: Reload firewalld
      command: firewall-cmd --reload
      when: ansible_facts['os_family'] == "RedHat"

    # =========================================================================
    # FAIL2BAN (Brute force protection)
    # =========================================================================
    - name: Configure fail2ban for SSH
      copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [DEFAULT]
          bantime = 3600
          findtime = 600
          maxretry = 3

          [sshd]
          enabled = true
          port = {{ ssh_port }}
          filter = sshd
          logpath = /var/log/auth.log
          maxretry = 3
      notify: Restart fail2ban

    # =========================================================================
    # AUTOMATIC SECURITY UPDATES
    # =========================================================================
    - name: Enable automatic security updates (Debian/Ubuntu)
      copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
          APT::Periodic::AutocleanInterval "7";
      when: ansible_facts['os_family'] == "Debian"

    - name: Enable automatic security updates (RHEL/Amazon Linux)
      service:
        name: dnf-automatic.timer
        state: started
        enabled: yes
      when: ansible_facts['os_family'] == "RedHat"

    # =========================================================================
    # SYSTEM LIMITS
    # =========================================================================
    - name: Set file descriptor limits
      copy:
        dest: /etc/security/limits.d/gravity.conf
        content: |
          # Gravity Platform limits
          * soft nofile 65535
          * hard nofile 65535
          root soft nofile 65535
          root hard nofile 65535

    # =========================================================================
    # DOCKER HARDENING
    # =========================================================================
    - name: Create Docker daemon config
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "100m",
              "max-file": "3"
            },
            "live-restore": true,
            "userland-proxy": false
          }
      notify: Restart Docker

    # =========================================================================
    # AUDIT LOGGING
    # =========================================================================
    - name: Install auditd (Debian/Ubuntu)
      apt:
        name: auditd
        state: present
      when: ansible_facts['os_family'] == "Debian"

    - name: Ensure auditd running (RHEL/Amazon Linux)
      service:
        name: auditd
        state: started
        enabled: yes
      when: ansible_facts['os_family'] == "RedHat"

    - name: Configure audit rules for Docker
      copy:
        dest: /etc/audit/rules.d/docker.rules
        content: |
          # Docker daemon
          -w /usr/bin/docker -p wa -k docker
          -w /var/lib/docker -p wa -k docker
          -w /etc/docker -p wa -k docker
          -w /lib/systemd/system/docker.service -p wa -k docker
          -w /etc/docker/daemon.json -p wa -k docker
      notify: Restart auditd

  handlers:
    - name: Restart SSH
      service:
        name: ssh
        state: restarted

    - name: Restart fail2ban
      service:
        name: fail2ban
        state: restarted

    - name: Restart Docker
      service:
        name: docker
        state: restarted

    - name: Restart auditd
      service:
        name: auditd
        state: restarted
