---
# Unoverse Runtime Installation Playbook (docs/architecture/UNOVERSE_RUNTIME.md §4.7)
# Deploys the LITE runtime — runs ONE compiled workflow on a customer box. The lean sibling of
# install-umap.yml: one container, its own VM (the runtime is one SKU per VM, §3). Nodes come from
# npm inside the image (§5); secrets come from the ENV (§6, never a DB); the workflow artifact is
# mounted, not baked.
#
# Usage — the workflow comes ONE of two ways:
#   A) BY ID (compiled live from the platform DB — the easy path):
#     ansible-playbook ... playbooks/install-runtime.yml -l runtime_vms -e docr_token=<t> \
#       -e workflow_id=<id> -e platform_url=https://<platform-host> -e platform_token=<admin-jwt> \
#       -e runtime_env_file=./runtime.env
#   B) BY FILE (a portable artifact, e.g. air-gapped):
#     ansible-playbook ... -e docr_token=<t> -e workflow_artifact=./my-workflow.json -e runtime_env_file=./runtime.env
#
# Prerequisites:
#   - Runtime VM provisioned + reachable via SSH
#   - DOCR token (to pull the image) — .env or -e docr_token=...
#   - The workflow: EITHER workflow_id + platform_url + platform_token (A), OR a workflow_artifact file (B).
#     (A) fetches GET {platform_url}/api/workflows/{id}/artifact — the engine compiles it from the DB row.
#   - A filled .env for the workflow → runtime_env_file. Generate the template AFTER first boot with:
#       curl http://<host>:4107/env.example > runtime.env      (then fill in the values)
#
# After deploy, SEE what's on the box: open  http://<host>:4107/   (the status page).

- name: Install Unoverse Runtime on a runtime VM
  hosts: all
  become: yes

  vars:
    runtime_port: 4107
    runtime_dir: /opt/unoverse-runtime
    image: "registry.digitalocean.com/gravity-repo/unoverse-runtime:{{ gravity_version | default('latest') }}"

  pre_tasks:
    - name: "[1/8] Target"
      debug:
        msg: "Installing Unoverse Runtime on {{ inventory_hostname }} ({{ ansible_host }})"

    - name: "[2/8] Install Docker (if missing)"
      shell: |
        if ! command -v docker &> /dev/null; then
          curl -fsSL https://get.docker.com | sh
        else
          echo "Docker already installed"
        fi
      args:
        creates: /usr/bin/docker

    - name: "[3/8] Ensure Docker is running"
      service:
        name: docker
        state: started
        enabled: yes

  tasks:
    - name: "[4/8] Create runtime directories"
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
      loop:
        - "{{ runtime_dir }}"
        - "{{ runtime_dir }}/workflow"

    # (A) BY ID — the engine compiles the workflow from the DB row and returns the wire artifact.
    - name: "[5/8] Fetch the compiled artifact from the platform (by workflow_id)"
      get_url:
        url: "{{ platform_url }}/api/workflows/{{ workflow_id }}/artifact"
        dest: "{{ runtime_dir }}/workflow/workflow.json"
        headers:
          Authorization: "Bearer {{ platform_token }}"
        force: yes
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"
      when: workflow_id is defined and workflow_id != ""
      no_log: true

    # (B) BY FILE — a portable artifact provided directly (air-gapped / no platform access at deploy).
    - name: "[5/8] Copy the compiled workflow artifact"
      copy:
        src: "{{ workflow_artifact }}"
        dest: "{{ runtime_dir }}/workflow/workflow.json"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"
      when: (workflow_id is not defined or workflow_id == "") and (workflow_artifact is defined and workflow_artifact != "")

    # Secrets ride the ENV (§6), never git/the image. The operator fills the generated .env.example.
    - name: "[5/8] Copy the runtime .env (node credentials + Redis/auth settings)"
      copy:
        src: "{{ runtime_env_file }}"
        dest: "{{ runtime_dir }}/runtime.env"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
      when: runtime_env_file is defined and runtime_env_file != ""
      no_log: true

    - name: "[6/8] Login to DOCR"
      shell: echo "{{ docr_token }}" | docker login registry.digitalocean.com -u "{{ docr_token }}" --password-stdin
      when: docr_token is defined and docr_token != ""
      no_log: true

    - name: "[6/8] Pull the runtime image"
      command: "docker pull {{ image }}"

    # ── Auto-generate the .env template FROM THE WORKFLOW'S NODES (§6.1). No secrets needed, no boot:
    #    the image emits it via --print-env. This is how the deployment learns exactly what to provide. ──
    - name: "[7/8] Auto-generate the .env template from the workflow's nodes"
      command: >
        docker run --rm
        -v {{ runtime_dir }}/workflow:/workflow:ro
        -e WORKFLOW_PATH=/workflow/workflow.json
        {{ image }} node main.mjs --print-env
      register: env_template
      changed_when: false
      when: workflow_artifact is defined and workflow_artifact != ""

    - name: "[7/8] Save the generated .env template to the box"
      copy:
        content: "{{ env_template.stdout }}\n"
        dest: "{{ runtime_dir }}/.env.example"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"
      when: env_template is defined and (env_template.stdout | default('')) != ""

    - name: "[7/8] Stop the existing container (if any)"
      shell: |
        docker stop unoverse-runtime 2>/dev/null || true
        docker rm unoverse-runtime 2>/dev/null || true
      ignore_errors: yes

    - name: "[8/8] Start the runtime"
      command: >
        docker run -d
        --name unoverse-runtime
        --restart unless-stopped
        -p {{ runtime_port }}:{{ runtime_port }}
        {{ ('--env-file ' + runtime_dir + '/runtime.env') if (runtime_env_file is defined and runtime_env_file != '') else '' }}
        -e PORT={{ runtime_port }}
        -e AUTH_ENABLED={{ auth_enabled | default('true') }}
        -e WORKFLOW_PATH=/workflow/workflow.json
        -v {{ runtime_dir }}/workflow:/workflow:ro
        --memory={{ runtime_memory | default('1g') }}
        --cpus={{ runtime_cpus | default('1.0') }}
        {{ image }}

  post_tasks:
    - name: "Wait for the runtime to boot (it runs the preflight gate first)"
      pause:
        seconds: 6

    - name: "Health check — /health"
      uri:
        url: "http://localhost:{{ runtime_port }}/health"
        status_code: 200
      register: rt_health
      until: rt_health.status == 200
      retries: 20
      delay: 2
      ignore_errors: yes

    - name: "=== UNOVERSE RUNTIME DEPLOYMENT SUMMARY ==="
      debug:
        msg: |
          ============================================
          UNOVERSE RUNTIME DEPLOYED
          ============================================
          Host: {{ inventory_hostname }} ({{ ansible_host }})
          Health: {{ 'OK' if (rt_health.status | default(0)) == 200 else 'NOT READY — see the .env step below (a red preflight refuses to boot until required credentials are set)' }}

          Auto-generated .env template (from the workflow's nodes):  {{ runtime_dir }}/.env.example
            → It lists EXACTLY what this workflow needs — runtime settings + per-field node credentials.

          {% if runtime_env_file is not defined or runtime_env_file == '' %}
          NEXT (fill secrets, then it boots):
            1. Copy the template back:  scp {{ ansible_user }}@{{ ansible_host }}:{{ runtime_dir }}/.env.example ./runtime.env
            2. Fill in the values (names are pre-filled; never commit it).
            3. Re-run this playbook with:  -e runtime_env_file=./runtime.env
          {% else %}
          Credentials were provided (runtime.env) — the runtime should be live.
          {% endif %}

          See what's on the box:   http://{{ ansible_host }}:{{ runtime_port }}/          (status page)
          Machine status (JSON):   http://{{ ansible_host }}:{{ runtime_port }}/status
          MCP surface (clients):   http://{{ ansible_host }}:{{ runtime_port }}/mcp  +  /stream

          Notes:
            - Secrets are ENV-only (§6), auto-derived from the nodes — never a DB, never git.
            - If the workflow uses spatial/memory, co-deploy UMAP / the memory server (companion services).
          ============================================
