---
# Caddy Reverse Proxy Installation Playbook
# Installs Caddy and configures hostname-based routing for Gravity services
#
# Usage:
#   Direct mode (Caddy handles TLS):
#     ansible-playbook -i inventory/production.yml playbooks/install-caddy.yml -e "domain=whats-up.ai"
#
#   POC mode (includes UMAP subdomain):
#     ansible-playbook -i inventory/production.yml playbooks/install-caddy.yml -e "domain=whats-up.ai" -e "include_umap=true"
#
#   Behind Load Balancer (LB terminates TLS):
#     ansible-playbook -i inventory/production.yml playbooks/install-caddy.yml -e "domain=whats-up.ai" -e "behind_lb=true"
#
# This playbook:
#   1. Installs Caddy from official repo
#   2. Configures Caddyfile for hostname routing
#   3. Enables and starts Caddy service
#
# Caddy automatically provisions Let's Encrypt TLS certificates.

- name: Install Caddy Reverse Proxy
  hosts: all
  become: yes

  vars:
    caddy_domain: "{{ domain | default('localhost') }}"
    caddy_behind_lb: "{{ behind_lb | default(false) }}"
    caddy_include_umap: "{{ include_umap | default(false) }}"

  tasks:
    - name: "[1/5] Install prerequisites (Debian/Ubuntu)"
      apt:
        name:
          - debian-keyring
          - debian-archive-keyring
          - apt-transport-https
          - curl
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: "[1/5] Install prerequisites (RHEL/Amazon Linux)"
      dnf:
        name:
          - curl
          - yum-utils
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: "[2/5] Add Caddy GPG key (Debian/Ubuntu)"
      shell: |
        curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/caddy-stable-archive-keyring.gpg
      when: ansible_facts['os_family'] == "Debian"

    - name: "[2/5] Add Caddy repository (Debian/Ubuntu)"
      shell: |
        curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | tee /etc/apt/sources.list.d/caddy-stable.list
      args:
        creates: /etc/apt/sources.list.d/caddy-stable.list
      when: ansible_facts['os_family'] == "Debian"

    - name: "[2/5] Add Caddy repository (RHEL/Amazon Linux)"
      shell: |
        dnf install -y 'dnf-command(copr)'
        dnf copr enable -y @caddy/caddy
      args:
        creates: /etc/yum.repos.d/_copr:copr.fedorainfracloud.org:group_caddy:caddy.repo
      when: ansible_facts['os_family'] == "RedHat"

    - name: "[3/5] Install Caddy (Debian/Ubuntu)"
      apt:
        name: caddy
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: "[3/5] Install Caddy (RHEL/Amazon Linux)"
      dnf:
        name: caddy
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: "[4/5] Configure Caddyfile"
      template:
        src: ../templates/Caddyfile.j2
        dest: /etc/caddy/Caddyfile
        owner: root
        group: root
        mode: "0644"
      notify: Reload Caddy

    - name: "[5/5] Enable and start Caddy"
      service:
        name: caddy
        state: started
        enabled: yes

  handlers:
    - name: Reload Caddy
      service:
        name: caddy
        state: reloaded

  post_tasks:
    - name: "Verify Caddy is running"
      command: systemctl status caddy
      register: caddy_status
      changed_when: false

    - name: "=== CADDY INSTALLATION SUMMARY ==="
      debug:
        msg: |
          ============================================
          CADDY REVERSE PROXY INSTALLED
          ============================================
          Host: {{ inventory_hostname }} ({{ ansible_host }})
          Domain: {{ caddy_domain }}
          Mode: {% if caddy_behind_lb %}Behind Load Balancer (HTTP only){% else %}Direct (TLS via Lets Encrypt){% endif %}

          Configured routes:
            - {% if caddy_behind_lb %}http{% else %}https{% endif %}://{{ caddy_domain }} -> Canvas (port 3001)
            - {% if caddy_behind_lb %}http{% else %}https{% endif %}://api.{{ caddy_domain }} -> API Server (port 4100)
            - {% if caddy_behind_lb %}http{% else %}https{% endif %}://mcp.{{ caddy_domain }} -> MCP Server (port 4103)
            - {% if caddy_behind_lb %}http{% else %}https{% endif %}://unoverse.{{ caddy_domain }} -> Unoverse (port 4105)
          {% if caddy_include_umap %}
            - {% if caddy_behind_lb %}http{% else %}https{% endif %}://umap.{{ caddy_domain }} -> UMAP Service (port 5001)
          {% endif %}

          TLS: {% if caddy_behind_lb %}Terminated at Load Balancer{% else %}Auto-provisioned via Lets Encrypt{% endif %}

          To update routing, edit /etc/caddy/Caddyfile
          Then run: sudo systemctl reload caddy
          ============================================
