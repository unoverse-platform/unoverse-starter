---
# UMAP Service Installation Playbook
# Deploys UMAP to dedicated ML VM(s)
#
# Usage:
#   POC:        ansible-playbook -i inventory/production.yml playbooks/install-umap.yml
#   Enterprise: ansible-playbook -i inventory/production.yml playbooks/install-umap.yml -l ml_vms
#
# Prerequisites:
#   - ML VM provisioned and accessible via SSH
#   - DOCR token configured in .env or passed via -e docr_token=...
#
# After deployment, update App VMs .env:
#   UMAP_SERVICE_URL=http://<ML_VM_PRIVATE_IP>:5001

- name: Install UMAP Service on ML VM
  hosts: all
  become: yes

  pre_tasks:
    - name: "[1/7] Check current system"
      debug:
        msg: "Installing UMAP on {{ inventory_hostname }} ({{ ansible_host }})"

    - name: "[2/7] Install Docker via convenience script"
      shell: |
        if ! command -v docker &> /dev/null; then
          echo "Installing Docker..."
          curl -fsSL https://get.docker.com | sh
        else
          echo "Docker already installed"
        fi
      args:
        creates: /usr/bin/docker
      register: docker_install

    - name: "[2/7] Docker install output"
      debug:
        msg: "{{ docker_install.stdout_lines | default(['Docker already present']) }}"

    - name: "[3/7] Start Docker service"
      service:
        name: docker
        state: started
        enabled: yes

    - name: "[3/7] Verify Docker running"
      command: docker --version
      register: docker_version

    - name: "[3/7] Docker version"
      debug:
        msg: "{{ docker_version.stdout }}"

    - name: "[4/7] Add user to docker group"
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

  tasks:
    # ── Detect mode: POC (same VM) vs Enterprise (separate ML VM) ──
    - name: "[5/7] Check if platform is on this VM (POC mode)"
      stat:
        path: /opt/gravity/docker-compose.yml
      register: compose_file

    # ══════════════════════════════════════════════════════════════
    # POC MODE: UMAP runs inside docker compose (same network)
    # ══════════════════════════════════════════════════════════════
    - name: "[5b/7] POC — Remove standalone UMAP container (if exists)"
      shell: |
        docker stop gravity-umap 2>/dev/null || true
        docker rm gravity-umap 2>/dev/null || true
      when: compose_file.stat.exists
      ignore_errors: yes

    - name: "[6/7] POC — Start UMAP via docker compose"
      shell: |
        cd /opt/gravity
        docker compose pull --quiet umap
        docker compose up -d umap
      register: poc_result
      when: compose_file.stat.exists

    - name: "[6/7] POC — UMAP started via compose"
      debug:
        msg: "UMAP started as part of docker compose project (same Docker network as workflow)"
      when: compose_file.stat.exists

    # ══════════════════════════════════════════════════════════════
    # ENTERPRISE MODE: Standalone container on dedicated ML VM
    # ══════════════════════════════════════════════════════════════
    - name: "[5/7] Enterprise — Create UMAP directories"
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
      loop:
        - /opt/gravity-umap
        - /opt/gravity-umap/models
      when: not compose_file.stat.exists

    - name: "[6/7] Enterprise — Login to DOCR"
      shell: echo "{{ docr_token }}" | docker login registry.digitalocean.com -u "{{ docr_token }}" --password-stdin
      when: not compose_file.stat.exists and docr_token is defined and docr_token != ""
      no_log: true

    - name: "[6/7] Enterprise — Pull UMAP image"
      command: docker pull registry.digitalocean.com/gravity-repo/umap:{{ gravity_version | default('latest') }}
      when: not compose_file.stat.exists

    - name: "[7/7] Enterprise — Stop existing UMAP container"
      command: docker stop gravity-umap
      ignore_errors: yes
      when: not compose_file.stat.exists

    - name: "[7/7] Enterprise — Remove existing UMAP container"
      command: docker rm gravity-umap
      ignore_errors: yes
      when: not compose_file.stat.exists

    - name: "[7/7] Enterprise — Start UMAP service"
      command: >
        docker run -d
        --name gravity-umap
        --restart unless-stopped
        -p 5001:5001
        -v /opt/gravity-umap/models:/app/models
        --memory=2g
        --cpus=1.0
        registry.digitalocean.com/gravity-repo/umap:{{ gravity_version | default('latest') }}
      when: not compose_file.stat.exists

  post_tasks:
    - name: "Wait for UMAP to initialize"
      pause:
        seconds: 5

    - name: "Health check - UMAP (port 5001)"
      uri:
        url: "http://localhost:5001/health"
        status_code: 200
      register: umap_health
      until: umap_health.status == 200
      retries: 30
      delay: 2
      ignore_errors: yes

    - name: "=== UMAP DEPLOYMENT SUMMARY ==="
      debug:
        msg: |
          ============================================
          UMAP SERVICE DEPLOYED
          ============================================
          Host: {{ inventory_hostname }} ({{ ansible_host }})

          Health: {{ 'OK' if umap_health.status == 200 else 'FAILED' }}

          Internal URL: http://{{ ansible_host }}:5001

          Next steps:
            1. Update App VMs .env with:
               UMAP_SERVICE_URL=http://{{ ansible_host }}:5001
            
            2. Redeploy App VMs or restart the unoverse service
          ============================================
