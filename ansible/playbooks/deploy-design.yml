---
# Deploy Design (rx/ only)
# The fast lane for design iteration: rsyncs apps/unoverse/rx/ (components,
# atoms, org templates + styles — JSON definitions) to the server and restarts
# unoverse. NO build step: component nodes are definition-backed — they
# synthesize from rx/components/* at boot, and restyles of existing components
# apply live (rx/ is read directly).
#
# Use deploy-packages.yml instead when node PACKAGE source changed
# (apps/unoverse/nodes/*) — that lane builds; this one never does.
#
# Usage (via CLI — recommended):
#   unoverse deploy design
#
# Usage (direct ansible):
#   ansible-playbook -i inventory/production.yml playbooks/deploy-design.yml

- name: Deploy Design (rx definitions)
  hosts: all
  become: yes

  vars:
    gravity_dir: /opt/gravity
    local_root: "{{ playbook_dir }}/../.."

  pre_tasks:
    - name: "[0/2] Ensure rsync is installed"
      package:
        name: rsync
        state: present
      become: yes

  tasks:
    - name: "[1/2] Sync rx/ (design definitions) to server"
      ansible.posix.synchronize:
        src: "{{ local_root }}/apps/unoverse/rx/"
        dest: "{{ gravity_dir }}/apps/unoverse/rx/"
        delete: yes
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=.DS_Store"
          - "--exclude=*.swp"
          - "--exclude=*.log"

    - name: "[2/2] Restart unoverse (component nodes re-synthesize from rx/ at boot)"
      shell: |
        cd {{ gravity_dir }}
        docker compose restart unoverse 2>&1
      register: restart_result

    - name: "=== DESIGN DEPLOYED ==="
      debug:
        msg: |
          ============================================
          DESIGN DEPLOYED (rx/ definitions)
          ============================================
          Host:    {{ inventory_hostname }} ({{ ansible_host }})
          Restart: {{ 'OK' if restart_result.rc == 0 else 'FAILED' }}
          ============================================
