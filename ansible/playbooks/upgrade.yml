---
# Gravity Platform Upgrade Playbook
# Pulls latest images and restarts all services
#
# Usage:
#   POC:        ansible-playbook -i inventory/production.yml playbooks/upgrade.yml
#   Enterprise: ansible-playbook -i inventory/production.yml playbooks/upgrade.yml -l app_vms
#               ansible-playbook -i inventory/production.yml playbooks/upgrade.yml -l ml_vms

- name: Upgrade Gravity Platform
  hosts: all
  become: yes
  serial: 1

  pre_tasks:
    - name: Display upgrade info
      debug:
        msg: "Upgrading {{ inventory_hostname }} ({{ ansible_host }})"

  tasks:
    - name: Pull latest code
      command: git pull --rebase --autostash
      args:
        chdir: /opt/gravity

    - name: Pull new images
      command: docker compose pull
      args:
        chdir: /opt/gravity

    - name: Restart services
      command: docker compose up -d
      args:
        chdir: /opt/gravity

    - name: Wait for services to be healthy
      uri:
        url: "http://localhost:{{ item.port }}/health"
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: 30
      delay: 2
      loop:
        - { name: server, port: 4100 }
        - { name: workflow, port: 4101 }
        - { name: node-service, port: 4102 }
      ignore_errors: yes

  post_tasks:
    - name: Prune old Docker images
      command: docker image prune -af --filter "until=24h"
      register: prune_result

    - name: Display upgrade status
      debug:
        msg: "{{ inventory_hostname }} upgraded successfully"
